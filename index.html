<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>의대관 주간 업무 리스트</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
:root {
  --bg: #ffffff;
  --bg2: #f8fafc;
  --bg3: #f1f5f9;
  --border: rgba(0,0,0,.08);
  --border2: rgba(0,0,0,.13);
  --teal: #0d9488;
  --teal-dim: rgba(13,148,136,.12);
  --teal-dim2: rgba(13,148,136,.06);
  --amber: #d97706;
  --amber-dim: rgba(217,119,6,.1);
  --red: #dc2626;
  --red-dim: rgba(220,38,38,.1);
  --text: #0f172a;
  --text2: #475569;
  --text3: #94a3b8;
  --white: #fff;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 13px;
}
button { font-family: inherit; cursor: pointer; }
input, textarea { font-family: inherit; }

/* ── VIEW TOGGLE ── */
.view-toggle {
  display: flex;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 2px;
  gap: 2px;
}
.view-toggle-btn {
  padding: 4px 14px;
  border: none;
  border-radius: 6px;
  background: transparent;
  color: var(--text3);
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.view-toggle-btn.active {
  background: var(--white);
  color: var(--teal);
  box-shadow: 0 1px 4px rgba(0,0,0,.1);
}

/* ── HEADER ── */
#hdr {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border2);
  padding: 0 14px;
  height: 50px;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  align-items: center;
  gap: 8px;
  backdrop-filter: blur(10px);
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
.hdr-left { display: flex; align-items: center; gap: 8px; justify-content: flex-start; }
.hdr-center { display: flex; align-items: center; gap: 6px; justify-content: center; }
.hdr-right { display: flex; align-items: center; gap: 6px; justify-content: flex-end; }
.logo { display: flex; align-items: center; gap: 8px; }
.logo-q {
  background: var(--teal);
  color: #fff;
  font-size: 10px;
  font-weight: 900;
  padding: 2px 8px;
  border-radius: 4px;
  letter-spacing: .1em;
}
.logo-title { font-size: 14px; font-weight: 700; color: var(--text); }
.btn-nav {
  width: 30px; height: 30px;
  border: 1px solid var(--border2);
  border-radius: 7px;
  background: var(--bg3);
  color: var(--text2);
  font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: all .12s;
}
.btn-nav:hover { background: var(--teal-dim); color: var(--teal); border-color: var(--teal); }
#period-label {
  font-size: 11px; font-weight: 700; color: var(--text2);
  min-width: 128px; text-align: center;
  font-family: 'DM Mono', monospace;
}
.btn-today {
  padding: 5px 12px;
  background: var(--teal-dim);
  border: 1px solid var(--teal);
  border-radius: 7px;
  color: var(--teal);
  font-size: 11px; font-weight: 700;
  transition: all .12s;
}
.btn-today:hover { background: var(--teal); color: #0f1117; }
.btn-staff {
  padding: 5px 12px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 7px;
  color: var(--text2);
  font-size: 11px; font-weight: 700;
  transition: all .12s;
}
.btn-staff:hover { background: var(--amber-dim); color: var(--amber); border-color: var(--amber); }

.search-wrap { position: relative; }
.search-input-wrap {
  display: flex; align-items: center;
  background: var(--bg3);
  border: 1.5px solid var(--border2);
  border-radius: 7px;
  padding: 0 8px; gap: 5px;
  transition: border-color .12s;
  height: 30px; width: 180px;
}
.search-input-wrap:focus-within { border-color: var(--teal); background: var(--white); }
.search-icon { color: var(--text3); font-size: 12px; flex-shrink: 0; }
.search-input {
  flex: 1; border: none; background: transparent;
  padding: 0; font-size: 12px; color: var(--text); outline: none; min-width: 0;
}
.search-input::placeholder { color: var(--text3); }
.search-clear {
  width: 16px; height: 16px;
  border: none; background: var(--bg3);
  border-radius: 50%; color: #fff; font-size: 9px;
  cursor: pointer; display: none; align-items: center; justify-content: center;
  flex-shrink: 0; font-weight: 900;
}
.search-clear.on { display: flex; }
.search-clear:hover { background: var(--red); }
#search-results {
  position: absolute; top: calc(100% + 4px); left: 0;
  min-width: 380px; background: var(--white);
  border: 1px solid var(--border2); border-top: none;
  border-radius: 0 0 10px 10px; max-height: 400px; overflow-y: auto;
  z-index: 300; box-shadow: 0 8px 24px rgba(0,0,0,.1); display: none;
}
#search-results.on { display: block; }
.sr-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 14px; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background .1s;
}
.sr-item:last-child { border-bottom: none; }
.sr-item:hover { background: var(--bg3); }
.sr-date { font-size: 11px; font-weight: 700; color: var(--teal); white-space: nowrap; min-width: 72px; font-family: 'DM Mono', monospace; }
.sr-who { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px; white-space: nowrap; flex-shrink: 0; }
.sr-text { font-size: 12px; color: var(--text); line-height: 1.5; flex: 1; }
.sr-text mark { background: #fef08a; color: var(--text); border-radius: 2px; padding: 0 1px; }
.sr-status { font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 8px; flex-shrink: 0; }
.sr-status.done { background: var(--teal-dim); color: var(--teal); }
.sr-status.ing  { background: var(--amber-dim); color: var(--amber); }
.sr-empty { padding: 20px; text-align: center; color: var(--text3); font-size: 13px; }

.date-jump-wrap { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
.date-jump-input {
  padding: 5px 8px; border: 1.5px solid var(--border2);
  border-radius: 7px; font-size: 12px; font-weight: 600;
  color: var(--text); background: var(--white); outline: none;
  transition: border-color .12s; cursor: pointer; height: 30px;
}
.date-jump-input:focus { border-color: var(--teal); }
.date-jump-btn {
  padding: 0 11px; height: 30px;
  background: var(--teal); color: #fff; border: none;
  border-radius: 7px; font-size: 11px; font-weight: 700;
  cursor: pointer; transition: background .12s; white-space: nowrap;
}
.date-jump-btn:hover { background: #0f766e; }

/* ══════════════════════════════
   WEEK VIEW
══════════════════════════════ */
#week-hdr {
  display: grid;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 50px;
  z-index: 90;
  background: var(--bg);
}
.wh-spacer {
  padding: 10px 6px;
  border-right: 1px solid var(--border);
  min-width: 88px; width: 88px;
  font-size: 10px; font-weight: 700; color: var(--text3);
  display: flex; align-items: center; justify-content: center;
}
.wh-staff {
  padding: 10px 8px; text-align: center;
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
}
.wh-staff:last-child { border-right: none; }
.wh-staff-badge {
  font-size: 11px; font-weight: 800;
  padding: 2px 10px; border-radius: 20px;
  color: #fff; white-space: nowrap;
  letter-spacing: .02em;
  box-shadow: 0 1px 3px rgba(0,0,0,.15);
}

#grid { display: flex; flex-direction: column; }
.day-row {
  display: grid; border-bottom: 1px solid var(--border);
  min-height: 80px; animation: fadeIn .2s ease;
}
@keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }

.day-label {
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-start;
  padding: 8px 5px 6px;
  border-right: 1px solid var(--border);
  gap: 3px; min-height: 80px;
  min-width: 88px; width: 88px;
}
.day-label-dn { font-size: 10px; font-weight: 700; letter-spacing: .06em; color: var(--text3); text-transform: uppercase; }
.day-label-dd { font-size: 20px; font-weight: 900; color: var(--text2); font-family: 'DM Mono', monospace; line-height: 1; }
.day-row.today-row .day-label { background: var(--teal-dim2); }
.day-row.today-row .day-label-dd { color: var(--teal); }
.day-row.today-row .day-label-dn { color: var(--teal); }
.day-row.sun-row .day-label-dd, .day-row.sun-row .day-label-dn { color: #ef4444; }
.day-row.sat-row .day-label-dd, .day-row.sat-row .day-label-dn { color: #3b82f6; }

.day-cell {
  padding: 6px 8px; border-right: 1px solid var(--border);
  min-height: 80px; display: flex; flex-direction: column; gap: 4px;
  position: relative; transition: background .12s;
}
.day-cell:last-child { border-right: none; }
.day-cell.today-col { background: var(--teal-dim2); }
.day-cell.past { opacity: .55; }

/* 주요행사 칸 (주 보기) */
.day-sch-zone {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.sch-item {
  display: flex; align-items: flex-start; gap: 3px;
  padding: 3px 6px;
  background: rgba(13,148,136,.09);
  border: 1px solid rgba(13,148,136,.2);
  border-radius: 4px;
  font-size: 10px; font-weight: 600; color: var(--teal);
  line-height: 1.4; width: 100%;
}
.sch-text {
  flex: 1;
  word-break: break-word;
  white-space: normal;
  min-width: 0;
  overflow: hidden;
}
.add-sch-btn {
  width: 18px; height: 18px;
  border: 1px dashed rgba(13,148,136,.35);
  border-radius: 4px; background: transparent;
  color: rgba(13,148,136,.5); font-size: 13px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all .12s; flex-shrink: 0; margin-top: 1px;
}
.add-sch-btn:hover { border-color: var(--teal); color: var(--teal); background: var(--teal-dim); }

.todo-item {
  display: flex; align-items: flex-start; gap: 5px;
  padding: 4px 7px; background: var(--bg3);
  border-radius: 5px; border: 1px solid var(--border);
  font-size: 12px; font-weight: 500; color: var(--text);
  line-height: 1.4; transition: all .12s;
}
.todo-item:hover { border-color: var(--border2); }
.todo-item.status-ing { border-color: rgba(251,191,36,.35); background: rgba(251,191,36,.06); }
.todo-item.status-done { text-decoration: line-through; border-color: rgba(13,148,136,.2); }
.todo-item.dragging { opacity: .35; transform: scale(.97); cursor: grabbing; }
.todo-item[draggable="true"] { cursor: grab; }
.day-cell.drag-over { background: rgba(13,148,136,.08) !important; outline: 2px dashed var(--teal); outline-offset: -2px; }

.status-btn {
  flex-shrink: 0; margin-top: 1px; cursor: pointer;
  border: none; border-radius: 3px; padding: 1px 5px;
  font-size: 9px; font-weight: 800; letter-spacing: .03em;
  white-space: nowrap; transition: all .12s; line-height: 1.6;
}
.status-btn.s-none { background: var(--bg); color: var(--text3); border: 1px solid var(--border2); }
.status-btn.s-none:hover { color: var(--amber); border-color: var(--amber); }
.status-btn.s-ing { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(251,191,36,.4); }
.status-btn.s-done { background: var(--teal-dim); color: var(--teal); border: 1px solid rgba(45,212,191,.4); }
.todo-text { flex: 1; min-width: 0; word-break: break-all; cursor: pointer; }
.todo-text.expandable { cursor: pointer; }
.todo-text.expandable:hover { color: var(--teal); }
.todo-del {
  width: 14px; height: 14px; border: none; background: transparent;
  color: var(--text3); font-size: 11px; cursor: pointer; opacity: 0;
  flex-shrink: 0; padding: 0; display: flex; align-items: center;
  justify-content: center; border-radius: 3px; transition: all .12s;
}
.todo-item:hover .todo-del { opacity: 1; }
.todo-del:hover { background: var(--red-dim); color: var(--red); }
.add-btn {
  width: 22px; height: 22px;
  border: 1px dashed var(--border2); border-radius: 5px;
  background: transparent; color: var(--text3); font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: all .12s; flex-shrink: 0; margin-top: auto;
}
.add-btn:hover { border-color: var(--teal); color: var(--teal); background: var(--teal-dim); }
.inline-input-wrap { display: flex; gap: 4px; align-items: center; }
.inline-input {
  flex: 1; background: var(--bg2);
  border: 1.5px solid var(--teal); border-radius: 5px;
  color: var(--text); font-size: 12px; padding: 4px 7px; outline: none; min-width: 0;
}
.inline-ok {
  width: 22px; height: 22px; background: var(--teal); border: none;
  border-radius: 5px; color: #fff; font-weight: 900; font-size: 12px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}

/* ══════════════════════════════
   MONTH VIEW
══════════════════════════════ */
#month-view { display: none; }

.month-grid-hdr {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  border-bottom: 2px solid var(--border2);
  position: sticky;
  top: 50px;
  z-index: 90;
  background: var(--bg);
}
.month-dow {
  text-align: center;
  padding: 8px 4px;
  font-size: 11px;
  font-weight: 800;
  color: var(--text3);
  letter-spacing: .05em;
  border-right: 1px solid var(--border);
}
.month-dow:last-child { border-right: none; }
.month-dow.sat { color: #3b82f6; }
.month-dow.sun { color: #ef4444; }

.month-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
}
.month-cell {
  min-height: 120px;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  padding: 6px 5px;
  display: flex;
  flex-direction: column;
  gap: 3px;
  position: relative;
  transition: background .1s;
}
.month-cell:nth-child(7n) { border-right: none; }
.month-cell.empty { background: var(--bg2); }
.month-cell.today-cell { background: rgba(13,148,136,.04); }
.month-cell.other-month { opacity: .45; }

.month-day-num {
  font-size: 13px;
  font-weight: 800;
  color: var(--text2);
  font-family: 'DM Mono', monospace;
  line-height: 1;
  margin-bottom: 2px;
  align-self: flex-start;
}
.month-cell.today-cell .month-day-num {
  color: #fff;
  background: var(--teal);
  width: 22px; height: 22px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
}
.month-cell.sat .month-day-num { color: #3b82f6; }
.month-cell.sun .month-day-num { color: #ef4444; }
.month-cell.today-cell.sat .month-day-num,
.month-cell.today-cell.sun .month-day-num { color: #fff; }

/* 주요행사 월뷰 */
.month-sch-item {
  font-size: 10px; font-weight: 600;
  padding: 2px 5px; border-radius: 3px;
  background: rgba(13,148,136,.12);
  color: var(--teal);
  display: flex; align-items: center; gap: 3px;
  cursor: default;
}
.month-sch-text {
  flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0;
}
.month-sch-del {
  width: 13px; height: 13px; flex-shrink: 0;
  border: none; background: transparent; color: rgba(13,148,136,.5);
  font-size: 9px; cursor: pointer; border-radius: 2px;
  display: flex; align-items: center; justify-content: center; padding: 0;
  opacity: 0; transition: opacity .1s, color .1s;
}
.month-sch-item:hover .month-sch-del { opacity: 1; }
.month-sch-del:hover { color: var(--red) !important; }
.month-cell-input-wrap {
  display: flex; gap: 3px; align-items: center; margin-top: 2px;
}
.month-cell-input {
  flex: 1; min-width: 0;
  background: var(--white);
  border: 1.5px solid var(--teal); border-radius: 4px;
  color: var(--text); font-size: 10px; padding: 3px 6px; outline: none;
}
.month-cell-ok {
  width: 20px; height: 20px; background: var(--teal); border: none;
  border-radius: 4px; color: #fff; font-size: 11px; font-weight: 900;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer;
}

/* 직원 할일 요약 배지 */
.month-staff-row {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 2px 6px;
  border-radius: 4px;
  cursor: pointer;
  transition: all .1s;
  flex-shrink: 0;
  background: #e2e8f0;
}
.month-staff-row:hover { background: #cbd5e1; }
.month-staff-name {
  font-size: 10px;
  font-weight: 700;
  color: #475569;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 60px;
  flex: 1;
}
.month-staff-count {
  font-size: 9px; font-weight: 800;
  background: rgba(0,0,0,.1); color: #475569;
  padding: 1px 5px; border-radius: 10px;
  white-space: nowrap; flex-shrink: 0;
}
.month-req-count {
  font-size: 9px; font-weight: 800;
  background: rgba(220,38,38,.12); color: #dc2626;
  padding: 1px 5px; border-radius: 10px;
  white-space: nowrap; flex-shrink: 0;
  border: 1px solid rgba(220,38,38,.2);
}
.month-count-sep {
  font-size: 9px; font-weight: 700; color: #94a3b8; flex-shrink: 0;
}

/* ══════════════════════════════
   MONTH TODO POPUP (직원별 목록)
══════════════════════════════ */
.month-popup-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.5);
  z-index: 550;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(3px);
}
.month-popup-overlay.on { display: flex; }
.month-popup {
  background: var(--white);
  border: 1px solid var(--border2);
  border-radius: 14px;
  width: 400px;
  max-width: 96vw;
  max-height: 80vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 8px 40px rgba(0,0,0,.15);
  overflow: hidden;
}
.month-popup-hd {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.month-popup-badge {
  font-size: 12px; font-weight: 800;
  padding: 3px 12px; border-radius: 20px; color: #fff;
}
.month-popup-title {
  font-size: 13px; font-weight: 700; color: var(--text);
  flex: 1;
}
.month-popup-close {
  width: 26px; height: 26px;
  border: none; background: var(--bg3);
  border-radius: 6px; color: var(--text2); font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: all .12s;
}
.month-popup-close:hover { background: var(--red-dim); color: var(--red); }
.month-popup-body {
  padding: 12px 18px;
  overflow-y: auto;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.month-popup-add {
  padding: 12px 18px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}
.month-popup-input {
  flex: 1;
  padding: 8px 12px;
  background: var(--bg3);
  border: 1.5px solid var(--border2);
  border-radius: 8px;
  font-size: 13px;
  color: var(--text);
  outline: none;
  transition: border-color .12s;
}
.month-popup-input:focus { border-color: var(--teal); }
.month-popup-add-btn {
  padding: 8px 16px;
  background: var(--teal); color: #fff;
  border: none; border-radius: 8px;
  font-size: 12px; font-weight: 700;
  cursor: pointer; transition: background .12s;
  white-space: nowrap;
}
.month-popup-add-btn:hover { background: #0f766e; }

/* popup 내 todo-item 재사용 */
.popup-todo-item {
  display: flex; align-items: flex-start; gap: 5px;
  padding: 7px 10px; background: var(--bg3);
  border-radius: 6px; border: 1px solid var(--border);

.mini-cal-day { background: var(--white); text-align: center; font-size: 11px; font-weight: 600; color: var(--text2); padding: 6px 0; cursor: pointer; transition: background .1s, color .1s; border-top: 1px solid var(--border); border-right: 1px solid var(--border); position: relative; }

.btn-date-change { padding: 7px 12px; border: 1.5px solid var(--border2); border-radius: 8px; background: var(--bg3); color: var(--text2); font-size: 12px; font-weight: 700; cursor: pointer; transition: all .12s; white-space: nowrap; display: flex; align-items: center; gap: 5px; }

/* 전문 모달 */
.text-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 600; align-items: center; justify-content: center; backdrop-filter: blur(3px); }

/* TOAST */
#toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--bg2); border: 1px solid var(--border2); color: var(--text); padding: 10px 18px; border-radius: 8px; font-size: 12px; font-weight: 600; z-index: 999; transition: transform .2s; white-space: nowrap; box-shadow: 0 4px 20px rgba(0,0,0,.3); }

::-webkit-scrollbar { width: 4px; height: 4px; }

@media (max-width: 900px) {

      <input class="month-popup-input" id="popup-add-input" placeholder="할일 추가..." maxlength="60"
        onkeydown="if(event.key==='Enter')popupAddTodo()">
      <button class="month-popup-add-btn" onclick="popupAddTodo()">추가</button>

</div>

<div id="toast"></div>

<script>
/* ══════════════════════════════
   Firebase 설정
══════════════════════════════ */
const FB = {
  apiKey: "AIzaSyCBJ-ESvqR4i1mcfHZ1K6ww-bAyS_P5Azw",
  authDomain: "work-plan-calender.firebaseapp.com",
  databaseURL: "https://work-plan-calender-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "work-plan-calender",

  messagingSenderId: "594589022218",
  appId: "1:594589022218:web:a5264bce95b5a5dac287f3"
};

const COLORS = [
  '#2dd4bf','#60a5fa','#f472b6','#a78bfa',
  '#fb923c','#4ade80','#fbbf24','#f87171',
  '#38bdf8','#c084fc'
];

/* ══════════════════════════════
   상태
══════════════════════════════ */
let db = null;
let currentView = 'week'; // 'week' | 'month'
let weekOffset = 0;
let monthOffset = 0; // 0 = 이번 달
let staff = [];
let todos = {};
let schedules = {};
let selectedColor = COLORS[0];
let hiddenStaff = new Set(JSON.parse(localStorage.getItem('quetta_hidden')||'[]'));
let _editCtx = null;
let _calMonth = null;
let _calSelected = null;
let _calOpen = false;

// 팝업 컨텍스트
let _popupCtx = null; // { staffId, dk }

/* ══════════════════════════════
   Firebase 초기화
══════════════════════════════ */
function initFirebase() {
  try {
    firebase.initializeApp(FB);
    db = firebase.database();
    return true;
  } catch(e) { return false; }
}

/* ══════════════════════════════
   날짜 유틸
══════════════════════════════ */
function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function isToday(d) {
  const t = new Date(); t.setHours(0,0,0,0); return d.getTime() === t.getTime();
}
function isPast(d) {
  const t = new Date(); t.setHours(0,0,0,0); return d < t;
}
const DAY_KO = ['일','월','화','수','목','금','토'];
const DAY_EN = ['SUN','MON','TUE','WED','THU','FRI','SAT'];

function getWeekDates(offset = 0) {
  const today = new Date(); today.setHours(0,0,0,0);
  const day = today.getDay();
  const mon = new Date(today);
  mon.setDate(today.getDate() - (day===0?6:day-1) + offset*7);
  return Array.from({length:7}, (_,i) => { const d = new Date(mon); d.setDate(mon.getDate()+i); return d; });
}

function getMonthInfo(offset = 0) {
  const today = new Date();
  const year = today.getFullYear();
  const month = today.getMonth(); // 0-indexed
  const d = new Date(year, month + offset, 1);
  return { year: d.getFullYear(), month: d.getMonth() }; // 0-indexed month
}

/* ══════════════════════════════
   VIEW 전환
══════════════════════════════ */
function setView(v) {
  currentView = v;
  document.getElementById('btn-view-month').classList.toggle('active', v==='month');
  document.getElementById('btn-view-week').classList.toggle('active', v==='week');
  document.getElementById('week-view').style.display = v==='week' ? 'block' : 'none';
  document.getElementById('month-view').style.display = v==='month' ? 'block' : 'none';
  render();
}

function movePeriod(dir) {
  if(currentView === 'week') weekOffset += dir;
  else monthOffset += dir;
  render();
}

function goToday() {
  weekOffset = 0;
  monthOffset = 0;
  render();
  if(currentView === 'week') scrollToToday();
}

/* ══════════════════════════════
   메인 렌더
══════════════════════════════ */
function render() {
  if(currentView === 'week') renderWeek();
  else renderMonth();
}

/* ══════════════════════════════
   WEEK VIEW 렌더
══════════════════════════════ */
function renderWeek() {
  const hdrH = document.getElementById('hdr').offsetHeight;
  document.getElementById('week-hdr').style.top = hdrH + 'px';
  const dates = getWeekDates(weekOffset);
  const s = dates[0], e = dates[6];
  document.getElementById('period-label').textContent =
    `${s.getFullYear()}.${String(s.getMonth()+1).padStart(2,'0')}.${String(s.getDate()).padStart(2,'0')} – ${String(e.getMonth()+1).padStart(2,'0')}.${String(e.getDate()).padStart(2,'0')}`;

  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty-state');

  if(staff.length === 0) { grid.innerHTML=''; empty.style.display=''; return; }
  empty.style.display = 'none';

  const visibleStaff = staff.filter(s => !hiddenStaff.has(s.id));
  const colTpl = `88px repeat(${visibleStaff.length}, 1fr)`;
  document.getElementById('week-hdr').style.gridTemplateColumns = colTpl;

  // 주 헤더 (직원 이름 - 배경색 없음)
  const whdr = document.getElementById('week-hdr');
  whdr.innerHTML = `<div class="wh-spacer">주요행사</div>` +
    visibleStaff.map(s => `
      <div class="wh-staff">
        <span class="wh-staff-name">${escHtml(s.name)}</span>
        <button class="wh-req-btn" onclick="openRequestModalTo('${s.id}')" title="업무요청">📋</button>
      </div>
    `).join('');

  grid.innerHTML = dates.map(d => {
    const dk = dateKey(d);
    const dow = d.getDay();
    let rowCls = '';
    if(isToday(d)) rowCls='today-row';
    else if(isPast(d)) rowCls='past-row';
    if(dow===0) rowCls+=' sun-row';
    if(dow===6) rowCls+=' sat-row';

    // 주요행사 (학사일정)
    const schItems = (schedules[dk]||[]);
    const schHtml = schItems.map(sc => `
      <div class="sch-item" id="sci-${sc.id}">
        <span class="sch-text">${escHtml(sc.text)}</span>
        <button class="todo-del" style="opacity:1;flex-shrink:0" onclick="deleteSchedule('${dk}','${sc.id}')">✕</button>
      </div>
    `).join('');

    const cells = visibleStaff.map(sv => {
      const key = `${sv.id}_${dk}`;
      const items = todos[key]||[];
      const todosHtml = items.map(t => {
        const isReq = !!t.isRequest;
        const st = t.status||'none';
        let itemCls = isReq ? 'req-item' : '';
        if(st==='ing') itemCls += ' status-ing';
        else if(st==='done') itemCls += ' status-done';
        const btnCls = `s-${st}`;
        const btnLbl = st==='req'?'요청':st==='ing'?'진행':st==='done'?'완료':'대기';
        const full = escHtml(t.text);
        const isLong = t.text.length>28;
        const short = isLong ? escHtml(t.text.slice(0,28))+'…' : full;
        const textHtml = `<span class="todo-text" onclick="startEditTodo('${sv.id}','${dk}','${t.id}')" title="${full}">${short}</span>`;
        const fromTag     = isReq ? `<span class="req-from-tag">${escHtml(t.fromName||'')}</span>` : '';
        const deadlineTag = (isReq && t.deadline) ? `<span class="req-deadline-tag">${escHtml(t.deadline)}</span>` : '';
        return `<div class="todo-item ${itemCls}" id="ti-${t.id}" draggable="true"
          ondragstart="onTodoDragStart(event,'${sv.id}','${dk}','${t.id}')"
          ondragend="onTodoDragEnd(event)">
          <button class="status-btn ${btnCls}" onclick="cycleStatus('${sv.id}','${dk}','${t.id}')">${btnLbl}</button>
          ${textHtml}
          ${fromTag}
          ${deadlineTag}
          <button class="todo-del" onclick="deleteTodo('${sv.id}','${dk}','${t.id}')">✕</button>
        </div>`;
      }).join('');
      return `<div class="day-cell"
        ondragover="onCellDragOver(event)"
        ondragleave="onCellDragLeave(event)"
        ondrop="onCellDrop(event,'${sv.id}','${dk}')">
        ${todosHtml}
        <button class="add-btn" onclick="startAdd('${sv.id}','${dk}',this)" title="할일 추가">+</button>
      </div>`;
    }).join('');

    return `<div class="day-row ${rowCls}" style="grid-template-columns:${colTpl}">
      <div class="day-label">
        <div class="day-label-dn">${DAY_KO[dow]}요일</div>
        <div class="day-label-dd">${d.getDate()}</div>
        <div class="day-sch-zone">
          ${schHtml}
          <button class="add-sch-btn" onclick="startAddSchedule('${dk}',this)" title="주요행사 추가">+</button>
        </div>
      </div>
      ${cells}
    </div>`;
  }).join('');
}

/* ══════════════════════════════
   MONTH VIEW 렌더
══════════════════════════════ */
function renderMonth() {
  const hdrH = document.getElementById('hdr').offsetHeight;
  const { year, month } = getMonthInfo(monthOffset); // month: 0-indexed

  document.getElementById('period-label').textContent =
    `${year}년 ${month+1}월`;

  const empty = document.getElementById('empty-state');
  if(staff.length===0) { document.getElementById('month-grid').innerHTML=''; empty.style.display=''; return; }
  empty.style.display='none';

  // 요일 헤더
  const dowNames = ['일','월','화','수','목','금','토'];
  document.getElementById('month-dow-hdr').innerHTML = dowNames.map((d,i) =>
    `<div class="month-dow ${i===0?'sun':i===6?'sat':''}">${d}</div>`
  ).join('');

  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month+1, 0);
  const startDow = firstDay.getDay(); // 0=Sun
  const daysInMonth = lastDay.getDate();
  const today = new Date(); today.setHours(0,0,0,0);

  const visibleStaff = staff.filter(sv => !hiddenStaff.has(sv.id));

  let cells = '';

  // 앞 빈칸
  for(let i=0; i<startDow; i++) {
    cells += `<div class="month-cell empty"></div>`;
  }

  for(let day=1; day<=daysInMonth; day++) {
    const d = new Date(year, month, day);
    const dk = dateKey(d);
    const dow = d.getDay();
    const todayCell = d.getTime()===today.getTime();
    let cellCls = '';
    if(todayCell) cellCls='today-cell';
    if(dow===6) cellCls+=' sat';
    if(dow===0) cellCls+=' sun';

    // 날짜 숫자
    const dayNumHtml = `<div class="month-day-num">${day}</div>`;

    // 주요행사
    const schItems = (schedules[dk]||[]);
    const schHtml = schItems.map(sc =>
      `<div class="month-sch-item" title="${escHtml(sc.text)}">
        <span class="month-sch-text">${escHtml(sc.text)}</span>
        <button class="month-sch-del" onclick="event.stopPropagation();deleteSchedule('${dk}','${sc.id}')">✕</button>
      </div>`
    ).join('');

    // 직원별 할일 요약
    const staffRows = visibleStaff.map(sv => {
      const key = `${sv.id}_${dk}`;
      const items = todos[key]||[];
      if(items.length===0) return '';
      const color = sv.color||'#0d9488';
      const normalCnt  = items.filter(t => !t.isRequest).length;
      const requestCnt = items.filter(t =>  t.isRequest).length;
      const normalBadge  = normalCnt  > 0 ? `<span class="month-staff-count">${normalCnt}건</span>` : '';
      const requestBadge = requestCnt > 0 ? `<span class="month-req-count">${requestCnt}건</span>` : '';
      return `<div class="month-staff-row"
        onclick="event.stopPropagation();openMonthPopup('${sv.id}','${dk}','${escHtml(sv.name)}','${color}')">
        <span class="month-staff-name">${escHtml(sv.name)}</span>
        ${normalBadge}${requestBadge ? `<span class="month-count-sep">/</span>${requestBadge}` : ''}
      </div>`;
    }).join('');

    cells += `<div class="month-cell ${cellCls}" id="mc-${dk}" onclick="monthCellClick(event,'${dk}')">
      ${dayNumHtml}
      ${schHtml}
      ${staffRows}
    </div>`;
  }

  // 뒤 빈칸 (6주 맞춤)
  const total = startDow + daysInMonth;
  const remainder = total % 7;
  if(remainder !== 0) {
    for(let i=0; i<7-remainder; i++) cells += `<div class="month-cell empty"></div>`;
  }

  document.getElementById('month-grid').innerHTML = cells;
}

/* ══════════════════════════════
   월뷰 팝업
══════════════════════════════ */
function openMonthPopup(staffId, dk, staffName, color) {
  _popupCtx = { staffId, dk };
  document.getElementById('popup-badge').textContent = staffName;
  document.getElementById('popup-badge').style.background = color;
  const [y,m,d] = dk.split('-');
  document.getElementById('popup-title').textContent = `${y}.${m}.${d} 할일`;
  document.getElementById('popup-add-input').value = '';
  renderPopupBody();
  document.getElementById('month-popup').classList.add('on');
  setTimeout(() => document.getElementById('popup-add-input').focus(), 100);
}

function closeMonthPopup() {
  document.getElementById('month-popup').classList.remove('on');
  _popupCtx = null;
  renderMonth();
}

function monthCellClick(e, dk) {
  // 이미 인라인 입력이 열려 있으면 닫기
  const cell = document.getElementById('mc-' + dk);
  if(!cell) return;
  const existing = cell.querySelector('.month-cell-input-wrap');
  if(existing) { existing.remove(); return; }

  // 다른 셀의 인라인 입력 닫기
  document.querySelectorAll('.month-cell-input-wrap').forEach(el => el.remove());

  const wrap = document.createElement('div');
  wrap.className = 'month-cell-input-wrap';
  wrap.innerHTML = `<input class="month-cell-input" placeholder="주요행사 입력" maxlength="40">
    <button class="month-cell-ok">↵</button>`;
  cell.appendChild(wrap);

  const inp = wrap.querySelector('input');
  inp.focus();

  const save = () => {
    const v = inp.value.trim();
    if(v) addSchedule(dk, v);
    wrap.remove();
  };
  inp.addEventListener('keydown', ev => {
    if(ev.key === 'Enter') { ev.stopPropagation(); save(); }
    if(ev.key === 'Escape') { ev.stopPropagation(); wrap.remove(); }
  });
  wrap.querySelector('button').addEventListener('click', ev => { ev.stopPropagation(); save(); });
  inp.addEventListener('blur', () => setTimeout(() => { if(!wrap.contains(document.activeElement)) wrap.remove(); }, 150));
}

function renderPopupBody() {
  if(!_popupCtx) return;
  const { staffId, dk } = _popupCtx;
  const key = `${staffId}_${dk}`;
  const items = todos[key]||[];
  const body = document.getElementById('popup-body');

  if(items.length===0) {
    body.innerHTML = `<div style="color:var(--text3);font-size:13px;padding:10px 0;text-align:center">할일이 없습니다</div>`;
    return;
  }

  body.innerHTML = items.map(t => {
    const isReq = !!t.isRequest;
    const st = t.status||'none';
    let itemCls = isReq ? 'req-item' : '';
    if(st==='ing') itemCls += ' status-ing';
    else if(st==='done') itemCls += ' status-done';
    const btnCls = `s-${st}`;
    const btnLbl = st==='req'?'요청':st==='ing'?'진행':st==='done'?'완료':'대기';
    const fromTag     = isReq ? `<span class="req-from-tag">${escHtml(t.fromName||'')}</span>` : '';
    const deadlineTag = (isReq && t.deadline) ? `<span class="req-deadline-tag">${escHtml(t.deadline)}</span>` : '';
    return `<div class="popup-todo-item ${itemCls}" id="pti-${t.id}">
      <button class="status-btn ${btnCls}" onclick="popupCycleStatus('${t.id}')">${btnLbl}</button>
      <span class="popup-todo-text" onclick="popupEditTodo('${t.id}')">${escHtml(t.text)}</span>
      ${fromTag}${deadlineTag}
      <button class="todo-del" style="opacity:1" onclick="popupDeleteTodo('${t.id}')">✕</button>
    </div>`;
  }).join('');
}

async function popupAddTodo() {
  if(!_popupCtx) return;
  const inp = document.getElementById('popup-add-input');
  const v = inp.value.trim();
  if(!v) return;
  inp.value = '';
  const { staffId, dk } = _popupCtx;
  await addTodo(staffId, dk, v);
  renderPopupBody();
}

async function popupCycleStatus(id) {
  if(!_popupCtx) return;
  const { staffId, dk } = _popupCtx;
  await cycleStatus(staffId, dk, id);
  renderPopupBody();
}

async function popupDeleteTodo(id) {
  if(!_popupCtx) return;
  const { staffId, dk } = _popupCtx;
  await deleteTodo(staffId, dk, id);
  renderPopupBody();
}

function popupEditTodo(id) {
  if(!_popupCtx) return;
  const { staffId, dk } = _popupCtx;
  closeMonthPopup();
  // 수정 모달 열기
  setTimeout(() => startEditTodo(staffId, dk, id), 100);
}

/* ══════════════════════════════
   할일 추가 (인라인 - 주 보기)
══════════════════════════════ */
function startAdd(staffId, dk, btn) {
  const exist = btn.parentElement.querySelector('.inline-input-wrap');
  if(exist) { exist.remove(); btn.style.display='flex'; return; }
  btn.style.display='none';
  const wrap = document.createElement('div');
  wrap.className='inline-input-wrap';
  wrap.innerHTML=`<input class="inline-input" placeholder="할일 입력" maxlength="60" autofocus><button class="inline-ok">↵</button>`;
  btn.parentElement.insertBefore(wrap, btn);
  const inp=wrap.querySelector('input'), ok=wrap.querySelector('button');
  inp.focus();
  const save=()=>{ const v=inp.value.trim(); if(v) addTodo(staffId,dk,v); wrap.remove(); btn.style.display='flex'; };
  inp.addEventListener('keydown', e=>{if(e.key==='Enter')save();if(e.key==='Escape'){wrap.remove();btn.style.display='flex';}});
  ok.addEventListener('click',save);
  inp.addEventListener('blur',()=>setTimeout(()=>{ if(!wrap.contains(document.activeElement)){wrap.remove();btn.style.display='flex';}},150));
}

/* ══════════════════════════════
   Firebase CRUD
══════════════════════════════ */
function todoPath(staffId, dk) { return `todos/${staffId}/${dk}`; }

async function addTodo(staffId, dk, text) {
  const id = Date.now().toString(36)+Math.random().toString(36).slice(2,5);
  const item = { id, text, status:'none' };
  const key=`${staffId}_${dk}`;
  if(!todos[key]) todos[key]=[];
  todos[key].push(item);
  if(currentView==='week') render();
  if(db) { try { await db.ref(`${todoPath(staffId,dk)}/${id}`).set(item); } catch(e){ toast('저장 실패','err'); } }
  return item;
}

async function deleteTodo(staffId, dk, id) {
  const key=`${staffId}_${dk}`;
  todos[key]=(todos[key]||[]).filter(t=>t.id!==id);
  if(currentView==='week') render();
  if(db) { try { await db.ref(`${todoPath(staffId,dk)}/${id}`).remove(); } catch(e){} }
}

function startEditTodo(staffId, dk, id) {
  const key=`${staffId}_${dk}`;
  const item=(todos[key]||[]).find(t=>t.id===id);
  if(!item) return;
  _editCtx={staffId,dk,id};
  _calSelected=null; _calOpen=false;
  document.getElementById('edit-cal-wrap').style.display='none';
  document.getElementById('edit-cal-wrap').innerHTML='';
  document.getElementById('btn-date-change').classList.remove('active');
  const inp=document.getElementById('edit-modal-input');
  inp.value=item.text;
  document.getElementById('edit-modal').classList.add('on');
  setTimeout(()=>{ inp.focus(); inp.setSelectionRange(inp.value.length,inp.value.length); },50);
}

function closeEditModal() {
  document.getElementById('edit-modal').classList.remove('on');
  _editCtx=null; _calSelected=null; _calOpen=false;
  document.getElementById('edit-cal-wrap').style.display='none';
  document.getElementById('edit-cal-wrap').innerHTML='';
  document.getElementById('btn-date-change').classList.remove('active');
}

document.getElementById('edit-modal').addEventListener('keydown', e=>{
  if(e.key==='Enter'&&!e.shiftKey){ if(_calOpen) return; e.preventDefault(); confirmEditTodo(); }
});

async function confirmEditTodo() {
  if(!_editCtx) return;
  if(_calOpen&&_calSelected) { await confirmMoveDate(); return; }
  const newText=document.getElementById('edit-modal-input').value.trim();
  if(!newText){ toast('내용을 입력하세요','err'); return; }
  const {staffId,dk,id}=_editCtx;
  closeEditModal();
  await updateTodo(staffId,dk,id,newText);
  toast('수정 완료 ✓','ok');
}

async function updateTodo(staffId, dk, id, newText) {
  const key=`${staffId}_${dk}`;
  const item=(todos[key]||[]).find(t=>t.id===id);
  if(!item) return;
  item.text=newText;
  render();
  if(db){ try{ await db.ref(`${todoPath(staffId,dk)}/${id}/text`).set(newText); }catch(e){} }
}

async function cycleStatus(staffId, dk, id) {
  const key=`${staffId}_${dk}`;
  const item=(todos[key]||[]).find(t=>t.id===id);
  if(!item) return;
  const cycle={none:'ing',ing:'done',done:'none',req:'ing'};
  item.status=cycle[item.status||'none']||'none';
  if(currentView==='week') render();
  if(db){ try{ await db.ref(`${todoPath(staffId,dk)}/${id}/status`).set(item.status); }catch(e){} }
}

/* ══════════════════════════════
   미니 캘린더 (일정 변경)
══════════════════════════════ */
function toggleDatePicker() {
  _calOpen=!_calOpen;
  const wrap=document.getElementById('edit-cal-wrap');
  const btn=document.getElementById('btn-date-change');
  if(!_calOpen){ wrap.style.display='none'; wrap.innerHTML=''; btn.classList.remove('active'); _calSelected=null; return; }
  if(_editCtx){ const [y,m]=_editCtx.dk.split('-').map(Number); _calMonth={year:y,month:m}; }
  else { const now=new Date(); _calMonth={year:now.getFullYear(),month:now.getMonth()+1}; }
  _calSelected=null; wrap.style.display='block'; btn.classList.add('active');
  renderMiniCal();
}

function renderMiniCal() {
  const {year,month}=_calMonth;
  const firstDow=new Date(year,month-1,1).getDay();
  const daysInMonth=new Date(year,month,0).getDate();
  const today=new Date(); today.setHours(0,0,0,0);
  const todayDk=dateKey(today);
  const curTodoDk=_editCtx?_editCtx.dk:null;
  const dows=['일','월','화','수','목','금','토'];
  const dowHeaders=dows.map((d,i)=>{const cls=i===0?'sun':i===6?'sat':'';return`<div class="mini-cal-dow ${cls}">${d}</div>`;}).join('');
  let gridCells='';
  for(let i=0;i<firstDow;i++) gridCells+=`<div class="mini-cal-day empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const dk=`${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const colIdx=(firstDow+d-1)%7;
    let cls='';
    if(colIdx===6) cls+=' sat'; if(colIdx===0) cls+=' sun';
    if(dk===todayDk) cls+=' today';
    if(dk===_calSelected) cls+=' selected';
    else if(dk===curTodoDk&&dk!==_calSelected) cls+=' cur-todo';
    gridCells+=`<div class="mini-cal-day${cls}" onclick="selectCalDate('${dk}')">${d}</div>`;
  }
  let labelHtml='', confirmDisabled='disabled';
  if(_calSelected){ labelHtml=`<span class="mini-cal-selected-label picked">→ ${formatDkDisplay(_calSelected)}</span>`; if(_calSelected!==curTodoDk) confirmDisabled=''; }
  else labelHtml=`<span class="mini-cal-selected-label">날짜를 선택하세요</span>`;
  document.getElementById('edit-cal-wrap').innerHTML=`<div class="mini-cal"><div class="mini-cal-nav"><button class="mini-cal-nav-btn" onclick="miniCalMove(-1)">‹</button><span class="mini-cal-title">${year}년 ${month}월</span><button class="mini-cal-nav-btn" onclick="miniCalMove(1)">›</button></div><div class="mini-cal-grid">${dowHeaders}${gridCells}</div><div class="mini-cal-footer">${labelHtml}<button class="mini-cal-confirm-btn" onclick="confirmMoveDate()" ${confirmDisabled}>확인</button></div></div>`;
}

function miniCalMove(dir){ let{year,month}=_calMonth; month+=dir; if(month>12){month=1;year++;}if(month<1){month=12;year--;} _calMonth={year,month}; renderMiniCal(); }
function selectCalDate(dk){ if(dk===(_editCtx?_editCtx.dk:null)){toast('현재 날짜와 동일합니다','err');return;} _calSelected=dk; renderMiniCal(); }

async function confirmMoveDate() {
  if(!_calSelected||!_editCtx) return;
  const{staffId,dk:fromDk,id}=_editCtx;
  if(_calSelected===fromDk){toast('같은 날짜입니다','err');return;}
  const fromKey=`${staffId}_${fromDk}`, toKey=`${staffId}_${_calSelected}`;
  const fromList=todos[fromKey]||[];
  const idx=fromList.findIndex(t=>t.id===id);
  if(idx<0) return;
  const newText=document.getElementById('edit-modal-input').value.trim();
  const[item]=fromList.splice(idx,1);
  if(newText) item.text=newText;
  if(!todos[toKey]) todos[toKey]=[];
  todos[toKey].push(item);
  const targetDk=_calSelected;
  closeEditModal(); render();
  if(db){ try{ await db.ref(`${todoPath(staffId,fromDk)}/${id}`).remove(); await db.ref(`${todoPath(staffId,targetDk)}/${id}`).set(item); }catch(e){toast('이동 중 오류','err');return;} }
  goToDate(targetDk);
  toast(`${formatDkDisplay(targetDk)}로 이동됨 ✓`,'ok');
}

function formatDkDisplay(dk){ const[y,m,d]=dk.split('-'); const date=new Date(Number(y),Number(m)-1,Number(d)); return`${y}.${m}.${d} (${DAY_KO[date.getDay()]})`; }

/* ══════════════════════════════
   드래그 앤 드롭
══════════════════════════════ */
let _drag=null, _dragId=null;
function onTodoDragStart(e,staffId,dk,id){ _drag={staffId,dk,id}; _dragId=id; e.dataTransfer.effectAllowed='move'; setTimeout(()=>{ const el=document.getElementById(`ti-${id}`); if(el) el.classList.add('dragging'); },0); }
function onTodoDragEnd(e){ if(_dragId){ const el=document.getElementById(`ti-${_dragId}`); if(el) el.classList.remove('dragging'); _dragId=null; } document.querySelectorAll('.day-cell.drag-over').forEach(c=>c.classList.remove('drag-over')); _drag=null; }
function onCellDragOver(e){ if(!_drag) return; e.preventDefault(); e.dataTransfer.dropEffect='move'; e.currentTarget.classList.add('drag-over'); }
function onCellDragLeave(e){ e.currentTarget.classList.remove('drag-over'); }
async function onCellDrop(e,toStaffId,toDk){
  e.preventDefault(); e.currentTarget.classList.remove('drag-over');
  if(!_drag) return;
  const{staffId:fromStaffId,dk:fromDk,id}=_drag;
  if(fromStaffId===toStaffId&&fromDk===toDk) return;
  const fromKey=`${fromStaffId}_${fromDk}`, toKey=`${toStaffId}_${toDk}`;
  const fromList=todos[fromKey]||[];
  const idx=fromList.findIndex(t=>t.id===id);
  if(idx<0) return;
  const[item]=fromList.splice(idx,1);
  if(!todos[toKey]) todos[toKey]=[];
  todos[toKey].push(item);
  render(); scrollToToday();
  if(db){ try{ await db.ref(`${todoPath(fromStaffId,fromDk)}/${id}`).remove(); await db.ref(`${todoPath(toStaffId,toDk)}/${id}`).set(item); }catch(e){toast('이동 중 오류','err');} }
  toast('이동 완료 ✓','ok');
}

/* ══════════════════════════════
   학사일정(주요행사) CRUD
══════════════════════════════ */
function startAddSchedule(dk, btn) {
  const exist=btn.parentElement.querySelector('.inline-input-wrap');
  if(exist){exist.remove();btn.style.display='flex';return;}
  btn.style.display='none';
  const wrap=document.createElement('div'); wrap.className='inline-input-wrap';
  wrap.innerHTML=`<input class="inline-input" placeholder="주요행사 입력" maxlength="40" autofocus><button class="inline-ok">↵</button>`;
  btn.parentElement.insertBefore(wrap,btn);
  const inp=wrap.querySelector('input');
  inp.focus();
  const save=()=>{ const v=inp.value.trim(); if(v) addSchedule(dk,v); wrap.remove(); btn.style.display='flex'; };
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')save();if(e.key==='Escape'){wrap.remove();btn.style.display='flex';}});
  wrap.querySelector('button').addEventListener('click',save);
  inp.addEventListener('blur',()=>setTimeout(()=>{ if(!wrap.contains(document.activeElement)){wrap.remove();btn.style.display='flex';}},150));
}

async function addSchedule(dk, text) {
  const id=Date.now().toString(36)+Math.random().toString(36).slice(2,4);
  const item={id,text};
  if(!schedules[dk]) schedules[dk]=[];
  schedules[dk].push(item);
  render();
  if(db){ try{ await db.ref(`schedules/${dk}/${id}`).set(item); }catch(e){} }
}

async function deleteSchedule(dk, id) {
  schedules[dk]=(schedules[dk]||[]).filter(s=>s.id!==id);
  render();
  if(db){ try{ await db.ref(`schedules/${dk}/${id}`).remove(); }catch(e){} }
}

/* ══════════════════════════════
   직원 관리
══════════════════════════════ */
function saveStaffLocal(){ try{ localStorage.setItem('quetta_staff',JSON.stringify(staff)); }catch(e){} }
function moveStaff(id,dir){ const i=staff.findIndex(s=>s.id===id); if(i<0) return; const j=i+dir; if(j<0||j>=staff.length) return; [staff[i],staff[j]]=[staff[j],staff[i]]; saveStaffLocal(); if(db) db.ref('staff').set(Object.fromEntries(staff.map(s=>[s.id,s]))).catch(()=>{}); renderStaffModal(); render(); }
function saveHiddenLocal(){ try{ localStorage.setItem('quetta_hidden',JSON.stringify([...hiddenStaff])); }catch(e){} }
function toggleHideStaff(id){ if(hiddenStaff.has(id)) hiddenStaff.delete(id); else hiddenStaff.add(id); saveHiddenLocal(); renderStaffModal(); render(); }
function loadStaffLocal(){ try{ const d=localStorage.getItem('quetta_staff'); if(d) staff=JSON.parse(d); }catch(e){} }

async function addStaff() {
  const inp=document.getElementById('new-staff-name');
  const name=inp.value.trim();
  if(!name){toast('이름을 입력하세요','err');return;}
  if(staff.find(s=>s.name===name)){toast('이미 있는 이름이에요','err');return;}
  const id='staff_'+Date.now().toString(36);
  // 색상 자동 배정
  const usedColors=staff.map(s=>s.color);
  const nextColor=COLORS.find(c=>!usedColors.includes(c))||COLORS[staff.length%COLORS.length];
  const member={id,name,color:nextColor};
  staff.push(member); saveStaffLocal();
  if(db){ try{ await db.ref(`staff/${id}`).set(member); }catch(e){toast('저장 실패','err');} }
  inp.value=''; renderStaffModal(); render(); toast(`${name} 추가됨`,'ok');
}

async function confirmDelStaff(id) {
  const s=staff.find(s=>s.id===id); if(!s) return;
  if(!confirm(`'${s.name}'을(를) 삭제할까요?\n이 직원의 모든 할일도 함께 삭제됩니다.`)) return;
  deleteStaff(id);
}

async function deleteStaff(id) {
  const s=staff.find(s=>s.id===id);
  staff=staff.filter(s=>s.id!==id); saveStaffLocal();
  for(const k of Object.keys(todos)){ if(k.startsWith(id+'_')) delete todos[k]; }
  if(db){ try{ await db.ref(`staff/${id}`).remove(); await db.ref(`todos/${id}`).remove(); }catch(e){} }
  renderStaffModal(); render(); if(s) toast(`${s.name} 삭제됨`);
}

function openStaffModal(){ renderStaffModal(); document.getElementById('staff-modal').classList.add('on'); document.getElementById('new-staff-name').focus(); }
function closeStaffModal(){ document.getElementById('staff-modal').classList.remove('on'); }

/* ══════════════════════════════
   업무요청 모달
══════════════════════════════ */
let _reqToId = '';
let _reqToName = '';

function openRequestModalTo(toId, toName) {
  _reqToId   = toId;
  _reqToName = toName;
  // 수신자 표시
  document.getElementById('req-to-badge').textContent = toName;
  // 요청자 셀렉트 채우기 (수신자 제외)
  const fromSel = document.getElementById('req-from');
  fromSel.innerHTML = '<option value="">요청자 선택</option>';
  staff.forEach(s => {
    if(s.id !== toId)
      fromSel.innerHTML += `<option value="${s.id}">${s.name}</option>`;
  });
  // 날짜 초기값: 오늘
  const today = new Date();
  const todayStr = dateKey(today);
  document.getElementById('req-start-date').value = todayStr;
  document.getElementById('req-end-date').value   = todayStr;
  document.getElementById('req-content').value    = '';
  document.getElementById('request-modal').classList.add('on');
  setTimeout(() => document.getElementById('req-content').focus(), 80);
}

function closeRequestModal() {
  document.getElementById('request-modal').classList.remove('on');
}

async function submitRequest() {
  const fromId    = document.getElementById('req-from').value;
  const content   = document.getElementById('req-content').value.trim();
  const startDate = document.getElementById('req-start-date').value;
  const endDate   = document.getElementById('req-end-date').value;

  if(!fromId)    { toast('요청자를 선택하세요','err'); return; }
  if(!content)   { toast('요청 사항을 입력하세요','err'); return; }
  if(!startDate) { toast('시작일을 선택하세요','err'); return; }
  if(!endDate)   { toast('완료기한을 선택하세요','err'); return; }

  const fromStaff = staff.find(s => s.id === fromId);
  const fromName  = fromStaff ? fromStaff.name : '?';

  // 완료기한 표시용: M/D 형식
  const [ey, em, ed] = endDate.split('-');
  const deadlineLabel = `${parseInt(em)}/${parseInt(ed)}까지`;

  // 시작일 하루에만 추가
  const id   = 'req_' + Date.now().toString(36) + Math.random().toString(36).slice(2,5);
  const item = {
    id,
    text: content,
    fromName,
    deadline: deadlineLabel,
    status: 'req',
    isRequest: true
  };

  const key = `${_reqToId}_${startDate}`;
  if(!todos[key]) todos[key] = [];
  todos[key].push(item);

  closeRequestModal();
  render();

  if(db) {
    try {
      await db.ref(`todos/${_reqToId}/${startDate}/${id}`).set(item);
    } catch(e) { toast('저장 실패','err'); return; }
  }
  toast(`업무요청 추가 완료 ✓`, 'ok');
}


function renderStaffModal() {
  const sl=document.getElementById('staff-list-modal');
  if(staff.length===0){ sl.innerHTML='<div style="color:var(--text3);font-size:12px;padding:8px 0">아직 직원이 없습니다</div>'; return; }
  sl.innerHTML=staff.map((s,i)=>{
    const isHidden=hiddenStaff.has(s.id);
    return`<div class="staff-list-item" id="sli-${s.id}">
      <div class="staff-order-btns">
        <button class="staff-order-btn" onclick="moveStaff('${s.id}',-1)" ${i===0?'disabled':''}>▲</button>
        <button class="staff-order-btn" onclick="moveStaff('${s.id}',1)" ${i===staff.length-1?'disabled':''}>▼</button>
      </div>
      <span class="staff-list-name" style="${isHidden?'color:var(--text3);text-decoration:line-through':''}" id="sln-${s.id}">${escHtml(s.name)}</span>
      <button class="staff-edit-btn" onclick="startRenameStaff('${s.id}')">✏️</button>
      <button class="staff-hide-btn ${isHidden?'hidden-on':''}" onclick="toggleHideStaff('${s.id}')">${isHidden?'표시':'숨김'}</button>
      <button class="staff-list-del" onclick="confirmDelStaff('${s.id}')">✕</button>
    </div>`;
  }).join('');
}

function startRenameStaff(id) {
  const item = document.getElementById('sli-' + id);
  if(!item) return;
  // 이미 입력 중이면 취소
  if(item.querySelector('.staff-rename-input')) return;

  const nameEl = document.getElementById('sln-' + id);
  const oldName = staff.find(s=>s.id===id)?.name || '';
  const origHtml = nameEl.outerHTML;

  // 이름 텍스트 → 인라인 입력으로 교체
  const inp = document.createElement('input');
  inp.className = 'staff-rename-input modal-input';
  inp.value = oldName;
  inp.maxLength = 10;
  inp.style.cssText = 'flex:1;padding:4px 8px;font-size:13px;height:28px;min-width:0';
  nameEl.replaceWith(inp);
  inp.focus(); inp.select();

  const save = async () => {
    const newName = inp.value.trim();
    if(!newName) { inp.focus(); return; }
    if(newName === oldName) { renderStaffModal(); return; }
    if(staff.find(s=>s.name===newName && s.id!==id)) { toast('이미 있는 이름이에요','err'); inp.focus(); return; }
    const s = staff.find(s=>s.id===id);
    if(s) s.name = newName;
    saveStaffLocal();
    if(db) await db.ref(`staff/${id}/name`).set(newName).catch(()=>{});
    renderStaffModal();
    render();
    toast('이름 변경 완료 ✓','ok');
  };
  const cancel = () => renderStaffModal();

  inp.addEventListener('keydown', e => {
    if(e.key==='Enter') { e.preventDefault(); save(); }
    if(e.key==='Escape') cancel();
  });
  inp.addEventListener('blur', () => setTimeout(cancel, 150));
}

/* ══════════════════════════════
   Firebase 리스닝
══════════════════════════════ */
function startListening() {
  if(!db) return;
  db.ref('staff').on('value',snap=>{
    const val=snap.val()||{};
    const fbStaff=Object.values(val);
    const saved=JSON.parse(localStorage.getItem('quetta_staff')||'[]');
    const savedIds=saved.map(s=>s.id);
    const ordered=[...saved.filter(s=>fbStaff.find(f=>f.id===s.id)).map(s=>fbStaff.find(f=>f.id===s.id)||s),...fbStaff.filter(f=>!savedIds.includes(f.id))];
    staff=ordered; saveStaffLocal(); render(); renderStaffModal();
  });
  db.ref('schedules').on('value',snap=>{
    const val=snap.val()||{}; schedules={};
    for(const[dk,items] of Object.entries(val)) schedules[dk]=Object.values(items);
    render();
  });
  db.ref('todos').on('value',snap=>{
    const val=snap.val()||{}; todos={};
    for(const[staffId,days] of Object.entries(val)){
      for(const[dk,items] of Object.entries(days)){
        todos[`${staffId}_${dk}`]=Object.values(items);
      }
    }
    render();
  });
}

/* ══════════════════════════════
   검색
══════════════════════════════ */
let _searchTimer;
function onSearchInput(q){ document.getElementById('search-clear').classList.toggle('on',q.length>0); clearTimeout(_searchTimer); if(!q.trim()){closeSearchResults();return;} _searchTimer=setTimeout(()=>doSearch(q.trim()),200); }

function doSearch(q){
  const lower=q.toLowerCase(), results=[];
  for(const[key,items] of Object.entries(todos)){
    const underIdx=key.lastIndexOf('_'); if(underIdx<0) continue;
    const staffId=key.slice(0,underIdx), dk=key.slice(underIdx+1);
    if(!/^\d{4}-\d{2}-\d{2}$/.test(dk)) continue;
    const sv=staff.find(s=>s.id===staffId); if(!sv) continue;
    for(const t of(items||[])){
      if(t.text&&t.text.toLowerCase().includes(lower)) results.push({dk,staffName:sv.name,text:t.text,status:t.status||'none'});
    }
  }
  results.sort((a,b)=>b.dk.localeCompare(a.dk));
  const el=document.getElementById('search-results');
  el.classList.add('on');
  if(results.length===0){ el.innerHTML=`<div class="sr-empty">검색 결과가 없습니다</div>`; return; }
  const highlight=text=>escHtml(text).replace(new RegExp(escHtml(q).replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),m=>`<mark>${m}</mark>`);
  el.innerHTML=results.slice(0,80).map(r=>{
    const statusHtml=r.status==='done'?`<span class="sr-status done">완료</span>`:r.status==='ing'?`<span class="sr-status ing">진행</span>`:'';
    const[y,m,d]=r.dk.split('-');
    return`<div class="sr-item" onclick="goToDate('${r.dk}')"><span class="sr-date">${y}.${m}.${d}</span><span class="sr-who">${escHtml(r.staffName)}</span><span class="sr-text">${highlight(r.text)}</span>${statusHtml}</div>`;
  }).join('')+(results.length>80?`<div class="sr-empty" style="font-size:11px">${results.length}건 중 80건 표시</div>`:'');
}

function goToDate(dk){
  const d=new Date(dk); const today=new Date(); today.setHours(0,0,0,0);
  const mon=new Date(d); const dow=d.getDay(); mon.setDate(d.getDate()-(dow===0?6:dow-1));
  const todayMon=new Date(today); const todayDow=today.getDay(); todayMon.setDate(today.getDate()-(todayDow===0?6:todayDow-1));
  weekOffset=Math.round((mon-todayMon)/(7*24*60*60*1000));
  // 월뷰면 주뷰로 전환
  setView('week');
  closeSearchResults(); clearSearch();
  setTimeout(()=>{
    const rows=document.querySelectorAll('.day-row');
    const dates=getWeekDates(weekOffset);
    dates.forEach((dd,i)=>{ if(dateKey(dd)===dk&&rows[i]) rows[i].scrollIntoView({behavior:'smooth',block:'center'}); });
  },150);
}

function closeSearchResults(){ document.getElementById('search-results').classList.remove('on'); }
function jumpToDate(){ const val=document.getElementById('date-jump-input').value; if(!val){toast('날짜를 선택하세요','err');return;} goToDate(val); }
function clearSearch(){ document.getElementById('search-input').value=''; document.getElementById('search-clear').classList.remove('on'); closeSearchResults(); }
function scrollToToday(){ const tr=document.querySelector('.day-row.today-row'); if(tr) setTimeout(()=>tr.scrollIntoView({behavior:'smooth',block:'center'}),100); }

function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

let _tt;
function toast(msg,type=''){ const el=document.getElementById('toast'); el.textContent=msg; el.className=`toast on ${type}`; clearTimeout(_tt); _tt=setTimeout(()=>el.classList.remove('on'),2500); }

function openTextModal(text){ document.getElementById('text-modal-body').textContent=text; document.getElementById('text-modal').classList.add('on'); }
function closeTextModal(){ document.getElementById('text-modal').classList.remove('on'); }

window.addEventListener('resize',()=>{ if(currentView==='week'){ const hdrH=document.getElementById('hdr').offsetHeight; document.getElementById('week-hdr').style.top=hdrH+'px'; } });

document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ closeStaffModal(); closeTextModal(); closeSearchResults(); closeEditModal(); closeMonthPopup(); } });
document.addEventListener('click',e=>{ const sr=document.getElementById('search-results'); if(sr&&!e.target.closest('.search-wrap')) closeSearchResults(); });

/* ══════════════════════════════
   INIT
══════════════════════════════ */
const DEFAULT_ORDER=['김리아','이동현','강보름','김수빈','조병일'];

window.onload=()=>{
  loadStaffLocal();
  if(staff.length>1){
    const hasOrder=localStorage.getItem('quetta_staff');
    if(!hasOrder){ staff.sort((a,b)=>{ const ai=DEFAULT_ORDER.findIndex(n=>a.name.includes(n)); const bi=DEFAULT_ORDER.findIndex(n=>b.name.includes(n)); return(ai<0?99:ai)-(bi<0?99:bi); }); saveStaffLocal(); }
  }
  setView('week');
  const ok=initFirebase();
  if(ok){ startListening(); setTimeout(scrollToToday,800); }
  else{ render(); setTimeout(scrollToToday,200); }
};
