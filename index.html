<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>의대관 주간 업무 리스트</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
:root {
  --bg: #ffffff;
  --bg2: #f8fafc;
  --bg3: #f1f5f9;
  --border: rgba(0,0,0,.08);
  --border2: rgba(0,0,0,.13);
  --teal: #0d9488;
  --teal-dim: rgba(13,148,136,.12);
  --teal-dim2: rgba(13,148,136,.06);
  --amber: #d97706;
  --amber-dim: rgba(217,119,6,.1);
  --red: #dc2626;
  --red-dim: rgba(220,38,38,.1);
  --text: #0f172a;
  --text2: #475569;
  --text3: #94a3b8;
  --white: #fff;
  --today-glow: 0 0 0 2px rgba(13,148,136,.4);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 13px;
}
button { font-family: inherit; cursor: pointer; }
input, textarea { font-family: inherit; }

/* ── HEADER ── */
#hdr {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border2);
  padding: 0 14px;
  height: 50px;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  align-items: center;
  gap: 8px;
  backdrop-filter: blur(10px);
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
#search-bar { display: none; }
.hdr-left { display: flex; align-items: center; gap: 8px; justify-content: flex-start; }
.hdr-center { display: flex; align-items: center; gap: 6px; justify-content: center; }
.hdr-right { display: flex; align-items: center; gap: 6px; justify-content: flex-end; }
.logo {
  display: flex;
  align-items: center;
  gap: 8px;
}
.logo-q {
  background: var(--teal);
  color: #fff;
  font-size: 10px;
  font-weight: 900;
  padding: 2px 8px;
  border-radius: 4px;
  letter-spacing: .1em;
}
.logo-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
}
.hdr-spacer { flex: 1; }

.btn-nav {
  width: 30px;
  height: 30px;
  border: 1px solid var(--border2);
  border-radius: 7px;
  background: var(--bg3);
  color: var(--text2);
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .12s;
}
.btn-nav:hover { background: var(--teal-dim); color: var(--teal); border-color: var(--teal); }
#week-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--text2);
  min-width: 128px;
  text-align: center;
  font-family: 'DM Mono', monospace;
}

.btn-today {
  padding: 5px 12px;
  background: var(--teal-dim);
  border: 1px solid var(--teal);
  border-radius: 7px;
  color: var(--teal);
  font-size: 11px;
  font-weight: 700;
  transition: all .12s;
}
.btn-today:hover { background: var(--teal); color: #0f1117; }

.btn-staff {
  padding: 5px 12px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 7px;
  color: var(--text2);
  font-size: 11px;
  font-weight: 700;
  transition: all .12s;
}
.btn-staff:hover { background: var(--amber-dim); color: var(--amber); border-color: var(--amber); }

#search-bar { display: none; }
.search-input-wrap {
  display: flex;
  align-items: center;
  background: var(--bg3);
  border: 1.5px solid var(--border2);
  border-radius: 7px;
  padding: 0 8px;
  gap: 5px;
  transition: border-color .12s;
  height: 30px;
  width: 180px;
}
.search-input-wrap:focus-within { border-color: var(--teal); background: var(--white); }
.search-icon { color: var(--text3); font-size: 12px; flex-shrink: 0; }
.search-input {
  flex: 1;
  border: none;
  background: transparent;
  padding: 0;
  font-size: 12px;
  color: var(--ink);
  outline: none;
  min-width: 0;
}
.search-input::placeholder { color: var(--text3); }
.search-clear {
  width: 16px; height: 16px;
  border: none; background: var(--sl300);
  border-radius: 50%; color: #fff; font-size: 9px;
  cursor: pointer; display: none; align-items: center; justify-content: center;
  flex-shrink: 0; font-weight: 900;
}
.search-clear.on { display: flex; }
.search-clear:hover { background: var(--red); }

#search-results {
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  min-width: 380px;
  background: var(--white);
  border: 1px solid var(--border2);
  border-top: none;
  border-radius: 0 0 10px 10px;
  max-height: 400px;
  overflow-y: auto;
  z-index: 300;
  box-shadow: 0 8px 24px rgba(0,0,0,.1);
  display: none;
}
#search-results.on { display: block; }
.sr-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background .1s;
}
.sr-item:last-child { border-bottom: none; }
.sr-item:hover { background: var(--sl50); }
.sr-date {
  font-size: 11px;
  font-weight: 700;
  color: var(--teal);
  white-space: nowrap;
  min-width: 72px;
  font-family: 'DM Mono', monospace;
}
.sr-who {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 10px;
  white-space: nowrap;
  flex-shrink: 0;
}
.sr-text {
  font-size: 12px;
  color: var(--ink);
  line-height: 1.5;
  flex: 1;
}
.sr-text mark {
  background: #fef08a;
  color: var(--ink);
  border-radius: 2px;
  padding: 0 1px;
}
.sr-status {
  font-size: 10px;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 8px;
  flex-shrink: 0;
}
.sr-status.done { background: var(--teal-dim); color: var(--teal); }
.sr-status.ing  { background: var(--amber-dim); color: var(--amber); }
.sr-empty { padding: 20px; text-align: center; color: var(--text3); font-size: 13px; }
.search-wrap { position: relative; }
.date-jump-wrap {
  display: flex;
  align-items: center;
  gap: 5px;
  flex-shrink: 0;
}
.date-jump-input {
  padding: 5px 8px;
  border: 1.5px solid var(--border2);
  border-radius: 7px;
  font-size: 12px;
  font-weight: 600;
  color: var(--ink);
  background: var(--white);
  outline: none;
  transition: border-color .12s;
  cursor: pointer;
  height: 30px;
}
.date-jump-input:focus { border-color: var(--teal); }
.date-jump-btn {
  padding: 0 11px;
  height: 30px;
  background: var(--teal);
  color: #fff;
  border: none;
  border-radius: 7px;
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  transition: background .12s;
  white-space: nowrap;
}
.date-jump-btn:hover { background: #0f766e; }

/* ── WEEK HEADER ── */
#week-hdr {
  display: grid;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 50px;
  z-index: 90;
  background: var(--bg);
}
.wh-spacer {
  padding: 10px 6px;
  border-right: 1px solid var(--border);
  min-width: 80px;
  width: 80px;
}
.wh-staff {
  padding: 10px 8px;
  text-align: center;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 5px;
}
.wh-staff:last-child { border-right: none; }
.wh-staff-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}
.wh-staff-name {
  font-size: 12px;
  font-weight: 700;
  color: var(--text);
}

/* ── GRID ── */
#grid {
  display: flex;
  flex-direction: column;
}
.day-row {
  display: grid;
  border-bottom: 1px solid var(--border);
  min-height: 80px;
  animation: fadeIn .2s ease;
}
@keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }

.day-label {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 8px 5px 6px;
  border-right: 1px solid var(--border);
  gap: 3px;
  min-height: 80px;
}
.day-label-dn {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .06em;
  color: var(--text3);
  text-transform: uppercase;
}
.day-label-dd {
  font-size: 20px;
  font-weight: 900;
  color: var(--text2);
  font-family: 'DM Mono', monospace;
  line-height: 1;
}
.day-row.today-row .day-label { background: var(--teal-dim2); }
.day-row.today-row .day-label-dd { color: var(--teal); }
.day-row.today-row .day-label-dn { color: var(--teal); }
.day-row.sun-row .day-label-dd,
.day-row.sun-row .day-label-dn { color: #ef4444; }
.day-row.sat-row .day-label-dd,
.day-row.sat-row .day-label-dn { color: #3b82f6; }

.day-cell {
  padding: 6px 8px;
  border-right: 1px solid var(--border);
  min-height: 80px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  position: relative;
  transition: background .12s;
}
.day-cell:last-child { border-right: none; }
.sch-cell { display: none; }
.day-sch-list { display: flex; flex-direction: column; gap: 2px; width: 100%; }
.sch-item {
  display: flex;
  align-items: flex-start;
  gap: 3px;
  padding: 2px 5px;
  background: rgba(13,148,136,.09);
  border: 1px solid rgba(13,148,136,.2);
  border-radius: 4px;
  font-size: 10px;
  font-weight: 600;
  color: var(--teal);
  line-height: 1.4;
  width: 100%;
}
.sch-item:hover { background: rgba(13,148,136,.16); }
.sch-text { flex: 1; word-break: break-all; min-width: 0; }
.add-sch-btn {
  width: 18px; height: 18px;
  border: 1px dashed rgba(13,148,136,.35);
  border-radius: 4px;
  background: transparent;
  color: rgba(13,148,136,.5);
  font-size: 13px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all .12s; flex-shrink: 0;
  margin-top: 1px;
}
.add-sch-btn:hover { border-color: var(--teal); color: var(--teal); background: var(--teal-dim); }

.todo-item.dragging {
  opacity: .35;
  transform: scale(.97);
  cursor: grabbing;
}
.day-cell.drag-over {
  background: rgba(13,148,136,.08) !important;
  outline: 2px dashed var(--teal);
  outline-offset: -2px;
}
.todo-item[draggable="true"] { cursor: grab; }
.day-cell.today-col { background: var(--teal-dim2); }
.day-cell.past { opacity: .55; }
.day-cell:hover { background: rgba(255,255,255,.02); }

.todo-item {
  display: flex;
  align-items: flex-start;
  gap: 5px;
  padding: 4px 7px;
  background: var(--bg3);
  border-radius: 5px;
  border: 1px solid var(--border);
  font-size: 12px;
  font-weight: 500;
  color: var(--text);
  line-height: 1.4;
  position: relative;
  group: true;
  transition: all .12s;
}
.todo-item:hover { border-color: var(--border2); }
.todo-item.status-ing {
  border-color: rgba(251,191,36,.35);
  background: rgba(251,191,36,.06);
}
.todo-item.status-done {
  text-decoration: line-through;
  border-color: rgba(13,148,136,.2);
}

.status-btn {
  flex-shrink: 0;
  margin-top: 1px;
  cursor: pointer;
  border: none;
  border-radius: 3px;
  padding: 1px 5px;
  font-size: 9px;
  font-weight: 800;
  letter-spacing: .03em;
  white-space: nowrap;
  transition: all .12s;
  line-height: 1.6;
}
.status-btn.s-none {
  background: var(--bg);
  color: var(--text3);
  border: 1px solid var(--border2);
}
.status-btn.s-none:hover { color: var(--amber); border-color: var(--amber); }
.status-btn.s-ing {
  background: var(--amber-dim);
  color: var(--amber);
  border: 1px solid rgba(251,191,36,.4);
}
.status-btn.s-done {
  background: var(--teal-dim);
  color: var(--teal);
  border: 1px solid rgba(45,212,191,.4);
}
.todo-text { flex: 1; min-width: 0; word-break: break-all; cursor: pointer; }
.todo-text.expandable { cursor: pointer; }
.todo-text.expandable:hover { color: var(--teal); }
.todo-del {
  width: 14px;
  height: 14px;
  border: none;
  background: transparent;
  color: var(--text3);
  font-size: 11px;
  cursor: pointer;
  opacity: 0;
  flex-shrink: 0;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 3px;
  transition: all .12s;
}
.todo-item:hover .todo-del { opacity: 1; }
.todo-del:hover { background: var(--red-dim); color: var(--red); }

.add-btn {
  width: 22px;
  height: 22px;
  border: 1px dashed var(--border2);
  border-radius: 5px;
  background: transparent;
  color: var(--text3);
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .12s;
  flex-shrink: 0;
  margin-top: auto;
}
.add-btn:hover { border-color: var(--teal); color: var(--teal); background: var(--teal-dim); }

.inline-input-wrap {
  display: flex;
  gap: 4px;
  align-items: center;
}
.inline-input {
  flex: 1;
  background: var(--bg2);
  border: 1.5px solid var(--teal);
  border-radius: 5px;
  color: var(--text);
  font-size: 12px;
  padding: 4px 7px;
  outline: none;
  min-width: 0;
}
.inline-ok {
  width: 22px;
  height: 22px;
  background: var(--teal);
  border: none;
  border-radius: 5px;
  color: #fff;
  font-weight: 900;
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

/* ── EMPTY ── */
#empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 20px;
  gap: 12px;
  color: var(--text3);
}
#empty-state .em-icon { font-size: 40px; }
#empty-state .em-text { font-size: 15px; font-weight: 600; color: var(--text2); }
#empty-state .em-sub { font-size: 12px; }

/* ── MODAL ── */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.65);
  z-index: 500;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(3px);
}
.overlay.on { display: flex; }
.modal {
  background: var(--white);
  border: 1px solid var(--border2);
  border-radius: 14px;
  width: 360px;
  max-width: 95vw;
  box-shadow: 0 8px 40px rgba(0,0,0,.12);
}
.modal-hd {
  padding: 16px 18px;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.modal-close {
  width: 26px;
  height: 26px;
  border: none;
  background: var(--bg3);
  border-radius: 6px;
  color: var(--text2);
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .12s;
}
.modal-close:hover { background: var(--red-dim); color: var(--red); }
.modal-body { padding: 16px 18px; display: flex; flex-direction: column; gap: 12px; }
.modal-input-row {
  display: flex;
  gap: 8px;
}
.modal-input {
  flex: 1;
  padding: 9px 12px;
  background: var(--bg3);
  border: 1.5px solid var(--border2);
  border-radius: 8px;
  color: var(--text);
  font-size: 13px;
  outline: none;
  transition: border-color .12s;
}
.modal-input:focus { border-color: var(--teal); }
.btn-add-staff {
  padding: 9px 14px;
  background: var(--teal);
  border: none;
  border-radius: 8px;
  color: #0f1117;
  font-size: 12px;
  font-weight: 700;
  white-space: nowrap;
  transition: background .12s;
}
.btn-add-staff:hover { background: #5eead4; }
.staff-list { display: flex; flex-direction: column; gap: 6px; max-height: 260px; overflow-y: auto; }
.staff-list-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  background: var(--bg3);
  border-radius: 8px;
  border: 1px solid var(--border);
}
.staff-list-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.staff-list-name { flex: 1; font-size: 13px; font-weight: 600; color: var(--text); }
.staff-list-del {
  width: 24px;
  height: 24px;
  border: 1px solid var(--border);
  background: transparent;
  border-radius: 6px;
  color: var(--text3);
  font-size: 12px;
  transition: all .12s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.staff-list-del:hover { background: var(--red-dim); color: var(--red); border-color: var(--red); }
.staff-hide-btn {
  padding: 3px 8px;
  border: 1px solid var(--border2);
  background: transparent;
  border-radius: 6px;
  color: var(--text3);
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  transition: all .12s;
  white-space: nowrap;
}
.staff-hide-btn:hover { background: var(--amber-dim); color: var(--amber); border-color: var(--amber); }
.staff-hide-btn.hidden-on { background: var(--teal-dim); color: var(--teal); border-color: var(--teal); }
.staff-order-btns { display: flex; flex-direction: column; gap: 2px; flex-shrink: 0; }
.staff-order-btn {
  width: 20px;
  height: 16px;
  border: 1px solid var(--border2);
  background: var(--bg3);
  border-radius: 3px;
  color: var(--text3);
  font-size: 9px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .1s;
  padding: 0;
}
.staff-order-btn:hover { background: var(--teal-dim); color: var(--teal); border-color: var(--teal); }
.staff-order-btn:disabled { opacity: .25; cursor: not-allowed; }

.color-picker { display: flex; gap: 6px; flex-wrap: wrap; }
.color-opt {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  transition: transform .1s;
}
.color-opt:hover { transform: scale(1.15); }
.color-opt.sel { border-color: #fff; }

/* ── 미니 캘린더 (일정 변경용) ── */
#edit-cal-wrap {
  display: none;
}
.mini-cal {
  border: 1px solid var(--border2);
  border-radius: 10px;
  overflow: hidden;
  background: var(--bg3);
}
.mini-cal-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 10px;
  background: var(--teal-dim);
  border-bottom: 1px solid rgba(13,148,136,.15);
}
.mini-cal-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--teal);
  font-family: 'DM Mono', monospace;
}
.mini-cal-nav-btn {
  width: 22px; height: 22px;
  border: none; background: transparent;
  color: var(--teal); font-size: 15px;
  cursor: pointer; border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  transition: background .1s; line-height: 1;
}
.mini-cal-nav-btn:hover { background: rgba(13,148,136,.18); }
.mini-cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
}
.mini-cal-dow {
  background: var(--bg2);
  text-align: center;
  font-size: 9px;
  font-weight: 700;
  color: var(--text3);
  padding: 5px 0 4px;
  border-bottom: 1px solid var(--border);
}
.mini-cal-dow.sat { color: #3b82f6; }
.mini-cal-dow.sun { color: #ef4444; }
.mini-cal-day {
  background: var(--white);
  text-align: center;
  font-size: 11px;
  font-weight: 600;
  color: var(--text2);
  padding: 6px 0;
  cursor: pointer;
  transition: background .1s, color .1s;
  border-top: 1px solid var(--border);
  border-right: 1px solid var(--border);
  position: relative;
}
.mini-cal-day:nth-child(7n) { border-right: none; }
.mini-cal-day:hover:not(.empty) { background: var(--teal-dim); color: var(--teal); }
.mini-cal-day.empty { background: var(--bg3); cursor: default; color: transparent; }
.mini-cal-day.today::after {
  content: '';
  position: absolute;
  bottom: 3px; left: 50%;
  transform: translateX(-50%);
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--teal);
}
.mini-cal-day.today { color: var(--teal); font-weight: 900; }
.mini-cal-day.selected {
  background: var(--teal) !important;
  color: #fff !important;
  font-weight: 900;
}
.mini-cal-day.selected.today::after { background: rgba(255,255,255,.7); }
.mini-cal-day.sat { color: #3b82f6; }
.mini-cal-day.sun { color: #ef4444; }
.mini-cal-day.cur-todo {
  background: rgba(13,148,136,.08);
  font-weight: 800;
}
.mini-cal-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 10px;
  border-top: 1px solid var(--border);
  background: var(--bg2);
  gap: 8px;
}
.mini-cal-selected-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text2);
  flex: 1;
  min-width: 0;
}
.mini-cal-selected-label.picked { color: var(--teal); }
.mini-cal-confirm-btn {
  padding: 5px 14px;
  background: var(--teal);
  border: none;
  border-radius: 6px;
  color: #fff;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: background .12s, opacity .12s;
  white-space: nowrap;
  flex-shrink: 0;
}
.mini-cal-confirm-btn:hover:not(:disabled) { background: #0f766e; }
.mini-cal-confirm-btn:disabled { opacity: .35; cursor: not-allowed; }

/* 수정 모달 하단 버튼 행 */
.edit-modal-footer {
  display: flex;
  align-items: center;
  gap: 8px;
}
.btn-date-change {
  padding: 7px 12px;
  border: 1.5px solid var(--border2);
  border-radius: 8px;
  background: var(--bg3);
  color: var(--text2);
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: all .12s;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 5px;
}
.btn-date-change:hover { background: var(--teal-dim); color: var(--teal); border-color: var(--teal); }
.btn-date-change.active { background: var(--teal-dim); color: var(--teal); border-color: var(--teal); }

/* 전문 모달 */
.text-modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.45);
  z-index: 600;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(3px);
}
.text-modal-overlay.on { display: flex; }
.text-modal {
  background: var(--white);
  border: 1px solid var(--border2);
  border-radius: 12px;
  width: 380px;
  max-width: 92vw;
  box-shadow: 0 8px 40px rgba(0,0,0,.12);
  overflow: hidden;
}
.text-modal-hd {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border2);
  font-size: 12px;
  font-weight: 700;
  color: var(--text2);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.text-modal-close {
  width: 24px;
  height: 24px;
  border: none;
  background: var(--bg3);
  border-radius: 5px;
  color: var(--text2);
  font-size: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.text-modal-close:hover { background: var(--red-dim); color: var(--red); }
.text-modal-body {
  padding: 16px;
  font-size: 14px;
  font-weight: 500;
  color: var(--ink);
  line-height: 1.7;

/* TOAST */
#toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--bg2);
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 10px 18px;
  border-radius: 8px;
  font-size: 12px;

}
#toast.on { transform: translateX(-50%) translateY(0); }
#toast.ok { border-color: var(--teal); color: var(--teal); }

.spin {

}
@keyframes sp { to { transform: rotate(360deg); } }

::-webkit-scrollbar { width: 4px; height: 4px; }

<body>

<div class="overlay" id="edit-modal" onclick="if(event.target===this)closeEditModal()">
  <div class="modal" style="width:420px">

      ✏️ 할일 수정
      <button class="modal-close" onclick="closeEditModal()">✕</button>

      <!-- 텍스트 입력 -->

        style="resize:vertical;min-height:80px;padding:9px 12px;font-size:13px;line-height:1.6"
        maxlength="200" placeholder="할일 내용 입력"></textarea>

      <!-- 미니 캘린더 (일정 변경) -->

      <!-- 하단 버튼 행 -->

          📅 일정 변경
        </button>
        <div style="flex:1"></div>
        <button onclick="closeEditModal()"
          style="padding:7px 16px;border:1.5px solid var(--border2);border-radius:8px;background:var(--white);color:var(--text2);font-size:13px;font-weight:700;cursor:pointer">취소</button>
        <button onclick="confirmEditTodo()"
          style="padding:7px 16px;border:none;border-radius:8px;background:var(--teal);color:#fff;font-size:13px;font-weight:700;cursor:pointer">저장</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ══════════════════════════════
   🔧 Firebase 설정
══════════════════════════════ */
const FB = {
  apiKey: "AIzaSyCBJ-ESvqR4i1mcfHZ1K6ww-bAyS_P5Azw",
  authDomain: "work-plan-calender.firebaseapp.com",
  databaseURL: "https://work-plan-calender-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "work-plan-calender",
  storageBucket: "work-plan-calender.firebasestorage.app",
  messagingSenderId: "594589022218",
  appId: "1:594589022218:web:a5264bce95b5a5dac287f3"
};

const COLORS = [
  '#2dd4bf','#60a5fa','#f472b6','#a78bfa',
  '#fb923c','#4ade80','#fbbf24','#f87171',
  '#38bdf8','#c084fc'
];

/* ══════════════════════════════
   상태
══════════════════════════════ */
let db = null;
let weekOffset = 0;
let staff = [];
let todos = {};
let schedules = {};
let selectedColor = COLORS[0];
let listeners = [];
let _editCtx = null; // {staffId, dk, id}
let hiddenStaff = new Set(JSON.parse(localStorage.getItem('quetta_hidden')||'[]'));

/* ── 미니 캘린더 상태 ── */
let _calMonth = null;   // { year, month }
let _calSelected = null; // "YYYY-MM-DD"
let _calOpen = false;

/* ══════════════════════════════
   Firebase 초기화
══════════════════════════════ */
function initFirebase() {
  try {
    firebase.initializeApp(FB);
    db = firebase.database();
    return true;
  } catch(e) {
    console.warn('Firebase 초기화 실패:', e);
    return false;
  }
}

/* ══════════════════════════════
   주간 날짜 계산
══════════════════════════════ */
function getWeekDates(offset = 0) {
  const today = new Date();
  today.setHours(0,0,0,0);
  const day = today.getDay();
  const mon = new Date(today);
  mon.setDate(today.getDate() - (day === 0 ? 6 : day - 1) + offset * 7);
  return Array.from({length: 7}, (_, i) => {
    const d = new Date(mon);
    d.setDate(mon.getDate() + i);
    return d;
  });
}

function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function isToday(d) {
  const t = new Date(); t.setHours(0,0,0,0);
  return d.getTime() === t.getTime();
}

function isPast(d) {
  const t = new Date(); t.setHours(0,0,0,0);
  return d < t;
}

const DAY_KO = ['일','월','화','수','목','금','토'];
const DAY_EN = ['SUN','MON','TUE','WED','THU','FRI','SAT'];

/* ══════════════════════════════
   렌더
══════════════════════════════ */
function render() {
  const hdrH = document.getElementById('hdr').offsetHeight;
  document.getElementById('week-hdr').style.top = hdrH + 'px';
  const dates = getWeekDates(weekOffset);

  const s = dates[0], e = dates[6];
  document.getElementById('week-label').textContent =
    `${s.getFullYear()}.${String(s.getMonth()+1).padStart(2,'0')}.${String(s.getDate()).padStart(2,'0')} – ${String(e.getMonth()+1).padStart(2,'0')}.${String(e.getDate()).padStart(2,'0')}`;

  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty-state');

  if(staff.length === 0) {
    grid.innerHTML = '';
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';

  const visibleStaff = staff.filter(s => !hiddenStaff.has(s.id));
  const colTpl = `80px repeat(${visibleStaff.length}, 1fr)`;
  document.getElementById('week-hdr').style.gridTemplateColumns = colTpl;

  const whdr = document.getElementById('week-hdr');
  whdr.innerHTML = `<div class="wh-spacer"></div>` +
    visibleStaff.map(s => `
      <div class="wh-staff">
        <span class="wh-staff-name">${escHtml(s.name)}</span>
      </div>
    `).join('');

  grid.innerHTML = dates.map(d => {
    const dk = dateKey(d);
    const dow = d.getDay();
    let rowCls = '';
    if(isToday(d)) rowCls = 'today-row';
    else if(isPast(d)) rowCls = 'past-row';
    if(dow === 0) rowCls += ' sun-row';
    if(dow === 6) rowCls += ' sat-row';

    const cells = visibleStaff.map(s => {
      const key = `${s.id}_${dk}`;
      const items = todos[key] || [];
      const todosHtml = items.map(t => {
        const st = t.status || 'none';
        const itemCls = st === 'ing' ? 'status-ing' : st === 'done' ? 'status-done' : '';
        const btnCls  = `s-${st}`;
        const btnLbl  = st === 'ing' ? '진행' : st === 'done' ? '완료' : '대기';
        const full = escHtml(t.text);
        const isLong = t.text.length > 50;
        const short = isLong ? escHtml(t.text.slice(0,50)) + '<span class="ellipsis">…</span>' : full;
        const textHtml = isLong
          ? `<span class="todo-text expandable" title="클릭: 수정" onclick="startEditTodo('${s.id}','${dk}','${t.id}')">${short}</span>`
          : `<span class="todo-text" title="클릭: 수정" onclick="startEditTodo('${s.id}','${dk}','${t.id}')">${full}</span>`;
        return `<div class="todo-item ${itemCls}" id="ti-${t.id}" draggable="true"
          ondragstart="onTodoDragStart(event,'${s.id}','${dk}','${t.id}')"
          ondragend="onTodoDragEnd(event)">
          <button class="status-btn ${btnCls}" onclick="cycleStatus('${s.id}','${dk}','${t.id}')">${btnLbl}</button>
          ${textHtml}
          <button class="todo-del" onclick="deleteTodo('${s.id}','${dk}','${t.id}')">✕</button>
        </div>`;
      }).join('');
      return `<div class="day-cell"
        ondragover="onCellDragOver(event)"
        ondragleave="onCellDragLeave(event)"
        ondrop="onCellDrop(event,'${s.id}','${dk}')">
        ${todosHtml}
        <button class="add-btn" onclick="startAdd('${s.id}','${dk}',this)" title="할일 추가">+</button>
      </div>`;
    }).join('');

    const schItems = (schedules[dk] || []);
    const schHtml = schItems.map(sc => `
      <div class="sch-item" id="sci-${sc.id}">
        <span class="sch-text">${escHtml(sc.text)}</span>
        <button class="todo-del" onclick="deleteSchedule('${dk}','${sc.id}')">✕</button>
      </div>
    `).join('');

    return `<div class="day-row ${rowCls}" style="grid-template-columns:${colTpl}">
      <div class="day-label">
        <div class="day-label-dn">${DAY_KO[dow]}요일</div>
        <div class="day-label-dd">${d.getDate()}</div>
        ${schHtml ? `<div class="day-sch-list">${schHtml}</div>` : ''}
        <button class="add-sch-btn" onclick="startAddSchedule('${dk}',this)" title="학사일정 추가">+</button>
      </div>
      ${cells}
    </div>`;
  }).join('');
}

/* ══════════════════════════════
   할일 추가 (인라인)
══════════════════════════════ */
function startAdd(staffId, dk, btn) {
  const exist = btn.parentElement.querySelector('.inline-input-wrap');
  if(exist) { exist.remove(); btn.style.display='flex'; return; }

  btn.style.display = 'none';
  const wrap = document.createElement('div');
  wrap.className = 'inline-input-wrap';
  wrap.innerHTML = `
    <input class="inline-input" placeholder="할일 입력" maxlength="60" autofocus>
    <button class="inline-ok">↵</button>
  `;
  btn.parentElement.insertBefore(wrap, btn);

  const inp = wrap.querySelector('input');
  const ok  = wrap.querySelector('button');
  inp.focus();

  const save = () => {
    const v = inp.value.trim();
    if(v) addTodo(staffId, dk, v);
    wrap.remove();
    btn.style.display = 'flex';
  };

  inp.addEventListener('keydown', e => {
    if(e.key === 'Enter') save();
    if(e.key === 'Escape') { wrap.remove(); btn.style.display='flex'; }
  });
  ok.addEventListener('click', save);
  inp.addEventListener('blur', e => {
    setTimeout(() => { if(!wrap.contains(document.activeElement)) { wrap.remove(); btn.style.display='flex'; } }, 150);
  });
}

/* ══════════════════════════════
   Firebase CRUD
══════════════════════════════ */
function todoPath(staffId, dk) {
  return `todos/${staffId}/${dk}`;
}

async function addTodo(staffId, dk, text) {
  const id = Date.now().toString(36) + Math.random().toString(36).slice(2,5);
  const item = { id, text, status: 'none' };

  const key = `${staffId}_${dk}`;
  if(!todos[key]) todos[key] = [];
  todos[key].push(item);
  render();

  if(db) {
    try {
      await db.ref(`${todoPath(staffId, dk)}/${id}`).set(item);
    } catch(e) { toast('저장 실패','err'); }
  }
}

async function deleteTodo(staffId, dk, id) {
  const key = `${staffId}_${dk}`;
  todos[key] = (todos[key]||[]).filter(t => t.id !== id);
  render();

  if(db) {
    try {
      await db.ref(`${todoPath(staffId, dk)}/${id}`).remove();
    } catch(e) {}
  }
}

function startEditTodo(staffId, dk, id) {
  const key = `${staffId}_${dk}`;
  const item = (todos[key]||[]).find(t => t.id === id);
  if(!item) return;
  _editCtx = { staffId, dk, id };

  // 캘린더 초기화
  _calSelected = null;
  _calOpen = false;
  document.getElementById('edit-cal-wrap').style.display = 'none';
  document.getElementById('edit-cal-wrap').innerHTML = '';
  document.getElementById('btn-date-change').classList.remove('active');

  const inp = document.getElementById('edit-modal-input');
  inp.value = item.text;
  document.getElementById('edit-modal').classList.add('on');
  setTimeout(() => { inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }, 50);
}

function closeEditModal() {
  document.getElementById('edit-modal').classList.remove('on');
  _editCtx = null;
  _calSelected = null;
  _calOpen = false;
  document.getElementById('edit-cal-wrap').style.display = 'none';
  document.getElementById('edit-cal-wrap').innerHTML = '';
  document.getElementById('btn-date-change').classList.remove('active');
}

document.getElementById('edit-modal').addEventListener('keydown', e => {
  if(e.key === 'Enter' && !e.shiftKey) {
    // 캘린더 열려있을 때는 Enter 막기
    if(_calOpen) return;
    e.preventDefault();
    confirmEditTodo();
  }
});

async function confirmEditTodo() {
  if(!_editCtx) return;
  const newText = document.getElementById('edit-modal-input').value.trim();
  if(!newText) { toast('내용을 입력하세요','err'); return; }
  const {staffId, dk, id} = _editCtx;
  closeEditModal();
  await updateTodo(staffId, dk, id, newText);
  toast('수정 완료 ✓','ok');
}

async function updateTodo(staffId, dk, id, newText) {
  const key = `${staffId}_${dk}`;
  const item = (todos[key]||[]).find(t => t.id === id);
  if(!item) return;
  item.text = newText;

  const itemEl = document.getElementById(`ti-${id}`);
  if(itemEl) {
    let textEl = itemEl.querySelector('.todo-text');
    if(textEl) {
      textEl.style.display = '';
      const isLong = newText.length > 50;
      if(isLong) {
        const short = escHtml(newText.slice(0,50)) + '<span class="ellipsis">…</span>';
        textEl.className = 'todo-text expandable';
        textEl.title = '클릭: 수정';
        textEl.innerHTML = short;
        textEl.onclick = () => startEditTodo(staffId, dk, id);
      } else {
        textEl.className = 'todo-text';
        textEl.title = '클릭: 수정';
        textEl.innerHTML = escHtml(newText);
        textEl.onclick = () => startEditTodo(staffId, dk, id);
      }
    }
  }

  if(db) {
    try { await db.ref(`${todoPath(staffId, dk)}/${id}/text`).set(newText); } catch(e) {}
  }
}

/* ══════════════════════════════
   📅 미니 캘린더 (일정 변경)
══════════════════════════════ */
function toggleDatePicker() {
  _calOpen = !_calOpen;
  const wrap = document.getElementById('edit-cal-wrap');
  const btn  = document.getElementById('btn-date-change');

  if(!_calOpen) {
    wrap.style.display = 'none';
    wrap.innerHTML = '';
    btn.classList.remove('active');
    _calSelected = null;
    return;
  }

  // 현재 할일 날짜 기준으로 달력 열기
  if(_editCtx) {
    const [y, m] = _editCtx.dk.split('-').map(Number);
    _calMonth = { year: y, month: m };
  } else {
    const now = new Date();
    _calMonth = { year: now.getFullYear(), month: now.getMonth() + 1 };
  }
  _calSelected = null;
  wrap.style.display = 'block';
  btn.classList.add('active');
  renderMiniCal();
}

function renderMiniCal() {
  const { year, month } = _calMonth;
  const firstDow = new Date(year, month - 1, 1).getDay(); // 0=Sun
  const daysInMonth = new Date(year, month, 0).getDate();
  const today = new Date(); today.setHours(0,0,0,0);
  const todayDk = dateKey(today);
  const curTodoDk = _editCtx ? _editCtx.dk : null;

  // 월요일 시작: offset = (firstDow + 6) % 7  (0=Mon)
  const startOffset = (firstDow + 6) % 7;
  const dows = ['월','화','수','목','금','토','일'];

  let gridCells = '';

  // 헤더
  const dowHeaders = dows.map((d, i) => {
    const cls = i === 5 ? 'sat' : i === 6 ? 'sun' : '';
    return `<div class="mini-cal-dow ${cls}">${d}</div>`;
  }).join('');

  // 빈 셀
  for(let i = 0; i < startOffset; i++) {
    gridCells += `<div class="mini-cal-day empty"></div>`;
  }

  // 날짜 셀
  for(let d = 1; d <= daysInMonth; d++) {
    const dk = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const colIdx = (startOffset + d - 1) % 7; // 0=Mon, 5=Sat, 6=Sun
    let cls = '';
    if(colIdx === 5) cls += ' sat';
    if(colIdx === 6) cls += ' sun';
    if(dk === todayDk) cls += ' today';
    if(dk === _calSelected) cls += ' selected';
    else if(dk === curTodoDk && dk !== _calSelected) cls += ' cur-todo';

    const isCur = dk === curTodoDk;
    const title = isCur ? '현재 날짜' : '';
    gridCells += `<div class="mini-cal-day${cls}" onclick="selectCalDate('${dk}')" title="${title}">${d}</div>`;
  }

  // 선택된 날짜 라벨
  let labelHtml = '';
  let confirmDisabled = 'disabled';
  if(_calSelected) {
    labelHtml = `<span class="mini-cal-selected-label picked">→ ${formatDkDisplay(_calSelected)}</span>`;
    if(_calSelected !== curTodoDk) confirmDisabled = '';
  } else {
    labelHtml = `<span class="mini-cal-selected-label">날짜를 선택하세요</span>`;
  }

  document.getElementById('edit-cal-wrap').innerHTML = `
    <div class="mini-cal">
      <div class="mini-cal-nav">
        <button class="mini-cal-nav-btn" onclick="miniCalMove(-1)">‹</button>
        <span class="mini-cal-title">${year}년 ${month}월</span>
        <button class="mini-cal-nav-btn" onclick="miniCalMove(1)">›</button>
      </div>
      <div class="mini-cal-grid">
        ${dowHeaders}
        ${gridCells}
      </div>
      <div class="mini-cal-footer">
        ${labelHtml}
        <button class="mini-cal-confirm-btn" onclick="confirmMoveDate()" ${confirmDisabled}>확인</button>
      </div>
    </div>
  `;
}

function miniCalMove(dir) {
  let { year, month } = _calMonth;
  month += dir;
  if(month > 12) { month = 1; year++; }
  if(month < 1)  { month = 12; year--; }
  _calMonth = { year, month };
  renderMiniCal();
}

function selectCalDate(dk) {
  if(dk === (_editCtx ? _editCtx.dk : null)) {
    toast('현재 날짜와 동일합니다', 'err');
    return;
  }
  _calSelected = dk;
  renderMiniCal();
}

async function confirmMoveDate() {
  if(!_calSelected || !_editCtx) return;
  const { staffId, dk: fromDk, id } = _editCtx;

  if(_calSelected === fromDk) {
    toast('같은 날짜입니다', 'err');
    return;
  }

  const fromKey = `${staffId}_${fromDk}`;
  const toKey   = `${staffId}_${_calSelected}`;

  const fromList = todos[fromKey] || [];
  const idx = fromList.findIndex(t => t.id === id);
  if(idx < 0) return;

  // 현재 입력된 텍스트 함께 반영
  const newText = document.getElementById('edit-modal-input').value.trim();
  const [item] = fromList.splice(idx, 1);
  if(newText) item.text = newText;

  if(!todos[toKey]) todos[toKey] = [];
  todos[toKey].push(item);

  const targetDk = _calSelected;
  const displayLabel = formatDkDisplay(targetDk);

  closeEditModal();
  render();

  // Firebase 업데이트
  if(db) {
    try {
      await db.ref(`${todoPath(staffId, fromDk)}/${id}`).remove();
      await db.ref(`${todoPath(staffId, targetDk)}/${id}`).set(item);
    } catch(e) {
      toast('이동 중 오류 발생', 'err');
      return;
    }
  }

  // 해당 주로 이동
  goToDate(targetDk);
  toast(`${displayLabel}로 이동됨 ✓`, 'ok');
}

/* 날짜 포맷 표시 */
function formatDkDisplay(dk) {
  const [y, m, d] = dk.split('-');
  const date = new Date(Number(y), Number(m) - 1, Number(d));
  const dow = DAY_KO[date.getDay()];
  return `${y}.${m}.${d} (${dow})`;
}

let _drag = null;
let _dragId = null;

function onTodoDragStart(e, staffId, dk, id) {
  _drag = { staffId, dk, id };
  _dragId = id;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => { const el = document.getElementById(`ti-${id}`); if(el) el.classList.add('dragging'); }, 0);
}

function onTodoDragEnd(e) {
  if(_dragId) {
    const el = document.getElementById(`ti-${_dragId}`);
    if(el) el.classList.remove('dragging');
    _dragId = null;
  }
  document.querySelectorAll('.day-cell.drag-over').forEach(c => c.classList.remove('drag-over'));
  _drag = null;
}

function onCellDragOver(e) {
  if(!_drag) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drag-over');
}

function onCellDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}

async function onCellDrop(e, toStaffId, toDk) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if(!_drag) return;

  const { staffId: fromStaffId, dk: fromDk, id } = _drag;
  if(fromStaffId === toStaffId && fromDk === toDk) return;

  const fromKey = `${fromStaffId}_${fromDk}`;
  const toKey   = `${toStaffId}_${toDk}`;

  const fromList = todos[fromKey] || [];
  const idx = fromList.findIndex(t => t.id === id);
  if(idx < 0) return;

  const [item] = fromList.splice(idx, 1);
  if(!todos[toKey]) todos[toKey] = [];
  todos[toKey].push(item);

  render();
  scrollToToday();

  if(db) {
    try {
      await db.ref(`${todoPath(fromStaffId, fromDk)}/${id}`).remove();
      await db.ref(`${todoPath(toStaffId, toDk)}/${id}`).set(item);
    } catch(e) { toast('이동 중 오류 발생','err'); }
  }
  toast('이동 완료 ✓', 'ok');
}

async function cycleStatus(staffId, dk, id) {
  const key = `${staffId}_${dk}`;
  const item = (todos[key]||[]).find(t => t.id === id);
  if(!item) return;
  const cycle = { none: 'ing', ing: 'done', done: 'none' };
  item.status = cycle[item.status || 'none'] || 'none';
  render();

  if(db) {
    try {
      await db.ref(`${todoPath(staffId, dk)}/${id}/status`).set(item.status);
    } catch(e) {}
  }
}

function startAddSchedule(dk, btn) {
  const exist = btn.parentElement.querySelector('.inline-input-wrap');
  if(exist) { exist.remove(); btn.style.display='flex'; return; }
  btn.style.display = 'none';
  const wrap = document.createElement('div');
  wrap.className = 'inline-input-wrap';
  wrap.innerHTML = `<input class="inline-input" placeholder="일정 입력" maxlength="40" autofocus>
    <button class="inline-ok">↵</button>`;
  btn.parentElement.insertBefore(wrap, btn);
  const inp = wrap.querySelector('input');
  inp.focus();
  const save = () => {
    const v = inp.value.trim();
    if(v) addSchedule(dk, v);
    wrap.remove(); btn.style.display='flex';
  };
  inp.addEventListener('keydown', e => {
    if(e.key==='Enter') save();
    if(e.key==='Escape') { wrap.remove(); btn.style.display='flex'; }
  });
  wrap.querySelector('button').addEventListener('click', save);
  inp.addEventListener('blur', () => setTimeout(() => { if(!wrap.contains(document.activeElement)) { wrap.remove(); btn.style.display='flex'; } }, 150));
}

async function addSchedule(dk, text) {
  const id = Date.now().toString(36) + Math.random().toString(36).slice(2,4);
  const item = { id, text };
  if(!schedules[dk]) schedules[dk] = [];
  schedules[dk].push(item);
  render();
  if(db) {
    try { await db.ref(`schedules/${dk}/${id}`).set(item); } catch(e) {}
  }
}

async function deleteSchedule(dk, id) {
  schedules[dk] = (schedules[dk]||[]).filter(s => s.id !== id);
  render();
  if(db) {
    try { await db.ref(`schedules/${dk}/${id}`).remove(); } catch(e) {}
  }
}

══════════════════════════════ */
function saveStaffLocal() {
  try { localStorage.setItem('quetta_staff', JSON.stringify(staff)); } catch(e) {}
}
function moveStaff(id, dir) {
  const i = staff.findIndex(s => s.id === id);
  if(i < 0) return;
  const j = i + dir;
  if(j < 0 || j >= staff.length) return;
  [staff[i], staff[j]] = [staff[j], staff[i]];
  saveStaffLocal();
  if(db) db.ref('staff').set(Object.fromEntries(staff.map(s => [s.id, s]))).catch(()=>{});
  renderStaffModal();
  render();
}
function saveHiddenLocal() {
  try { localStorage.setItem('quetta_hidden', JSON.stringify([...hiddenStaff])); } catch(e) {}
}
function toggleHideStaff(id) {
  if(hiddenStaff.has(id)) hiddenStaff.delete(id);
  else hiddenStaff.add(id);
  saveHiddenLocal();
  renderStaffModal();
  render();
}
function loadStaffLocal() {
  try {
    const d = localStorage.getItem('quetta_staff');
    if(d) staff = JSON.parse(d);
  } catch(e) {}
}

async function addStaff() {
  const inp = document.getElementById('new-staff-name');
  const name = inp.value.trim();
  if(!name) { toast('이름을 입력하세요','err'); return; }
  if(staff.find(s => s.name === name)) { toast('이미 있는 이름이에요','err'); return; }

  const id = 'staff_' + Date.now().toString(36);
  const member = { id, name, color: selectedColor };
  staff.push(member);
  saveStaffLocal();

  if(db) {
    try {
      await db.ref(`staff/${id}`).set(member);
    } catch(e) { toast('저장 실패','err'); }
  }

  inp.value = '';
  renderStaffModal();
  render();
  toast(`${name} 추가됨`,'ok');
}

async function confirmDelStaff(id) {
  const s = staff.find(s => s.id === id);
  if(!s) return;
  if(!confirm(`'${s.name}'을(를) 삭제할까요?\n이 직원의 모든 할일도 함께 삭제됩니다.`)) return;
  deleteStaff(id);
}

async function deleteStaff(id) {
  const s = staff.find(s => s.id === id);
  staff = staff.filter(s => s.id !== id);
  saveStaffLocal();

  for(const k of Object.keys(todos)) {
    if(k.startsWith(id + '_')) delete todos[k];
  }

  if(db) {
    try {
      await db.ref(`staff/${id}`).remove();
      await db.ref(`todos/${id}`).remove();
    } catch(e) {}
  }

  renderStaffModal();
  render();
  if(s) toast(`${s.name} 삭제됨`);
}

══════════════════════════════ */
function startListening() {
  if(!db) return;

  db.ref('staff').on('value', snap => {
    const val = snap.val() || {};
    const fbStaff = Object.values(val);
    const saved = JSON.parse(localStorage.getItem('quetta_staff')||'[]');
    const savedIds = saved.map(s=>s.id);
    const ordered = [
      ...saved.filter(s => fbStaff.find(f=>f.id===s.id)).map(s => fbStaff.find(f=>f.id===s.id)||s),
      ...fbStaff.filter(f => !savedIds.includes(f.id))
    ];
    staff = ordered;
    saveStaffLocal();
    render();
    renderStaffModal();
  });

  db.ref('schedules').on('value', snap => {
    const val = snap.val() || {};
    schedules = {};
    for(const [dk, items] of Object.entries(val)) {
      schedules[dk] = Object.values(items);
    }
    render();
  });

  db.ref('todos').on('value', snap => {
    const val = snap.val() || {};
    todos = {};
    for(const [staffId, days] of Object.entries(val)) {
      for(const [dk, items] of Object.entries(days)) {
        const key = `${staffId}_${dk}`;
        todos[key] = Object.values(items);
      }
    }
    render();
  });
}

   검색
══════════════════════════════ */
let _searchTimer;
function onSearchInput(q) {
  document.getElementById('search-clear').classList.toggle('on', q.length > 0);
  clearTimeout(_searchTimer);
  if(!q.trim()) { closeSearchResults(); return; }
  _searchTimer = setTimeout(() => doSearch(q.trim()), 200);
}

function doSearch(q) {
  const lower = q.toLowerCase();
  const results = [];

  for(const [key, items] of Object.entries(todos)) {
    const underIdx = key.lastIndexOf('_');
    if(underIdx < 0) continue;
    const staffId = key.slice(0, underIdx);
    const dk = key.slice(underIdx + 1);
    if(!/^\d{4}-\d{2}-\d{2}$/.test(dk)) continue;
    const s = staff.find(s => s.id === staffId);
    if(!s) continue;
    for(const t of (items || [])) {
      if(t.text && t.text.toLowerCase().includes(lower)) {
        results.push({ dk, staffName: s.name, text: t.text, status: t.status||'none' });
      }
    }
  }

  results.sort((a,b) => b.dk.localeCompare(a.dk));

  const el = document.getElementById('search-results');
  el.classList.add('on');

  if(results.length === 0) {
    el.innerHTML = `<div class="sr-empty">검색 결과가 없습니다</div>`;
    return;
  }

  function highlight(text) {
    return escHtml(text).replace(new RegExp(escHtml(q).replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'), m=>`<mark>${m}</mark>`);
  }

  el.innerHTML = results.slice(0,80).map(r => {
    const statusHtml = r.status==='done'
      ? `<span class="sr-status done">완료</span>`
      : r.status==='ing'
      ? `<span class="sr-status ing">진행</span>`
      : '';
    const [y,m,d] = r.dk.split('-');
    return `<div class="sr-item" onclick="goToDate('${r.dk}')">
      <span class="sr-date">${y}.${m}.${d}</span>
      <span class="sr-who">${escHtml(r.staffName)}</span>
      <span class="sr-text">${highlight(r.text)}</span>
      ${statusHtml}
    </div>`;
  }).join('') + (results.length>80?`<div class="sr-empty" style="font-size:11px">${results.length}건 중 80건 표시</div>`:'');
}

function goToDate(dk) {
  const d = new Date(dk);
  const today = new Date(); today.setHours(0,0,0,0);
  const mon = new Date(d);
  const dow = d.getDay();
  mon.setDate(d.getDate() - (dow===0?6:dow-1));
  const todayMon = new Date(today);
  const todayDow = today.getDay();
  todayMon.setDate(today.getDate() - (todayDow===0?6:todayDow-1));
  weekOffset = Math.round((mon - todayMon) / (7*24*60*60*1000));
  render();
  closeSearchResults();
  clearSearch();
  // 해당 날짜 row로 스크롤
  setTimeout(() => {
    const rows = document.querySelectorAll('.day-row');
    const dates = getWeekDates(weekOffset);
    dates.forEach((dd, i) => {
      if(dateKey(dd) === dk && rows[i]) {
        rows[i].scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    });
  }, 150);
}

function closeSearchResults() {
  document.getElementById('search-results').classList.remove('on');
}

function jumpToDate() {
  const val = document.getElementById('date-jump-input').value;
  if(!val) { toast('날짜를 선택하세요','err'); return; }
  goToDate(val);
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  document.getElementById('search-clear').classList.remove('on');
  closeSearchResults();
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

   INIT
══════════════════════════════ */
const DEFAULT_ORDER = ['김리아', '이동현', '강보름', '김수빈', '조병일'];

window.onload = () => {
  loadStaffLocal();
  if(staff.length > 1) {
    const hasOrder = localStorage.getItem('quetta_staff');
    if(!hasOrder) {
      staff.sort((a,b) => {
        const ai = DEFAULT_ORDER.findIndex(n => a.name.includes(n));
        const bi = DEFAULT_ORDER.findIndex(n => b.name.includes(n));
        return (ai<0?99:ai) - (bi<0?99:bi);
      });
      saveStaffLocal();
    }
  }
  render();
  const ok = initFirebase();
  if(ok) {
    startListening();
    setTimeout(scrollToToday, 800);
  } else {
    render();
    setTimeout(scrollToToday, 200);
  }
};
</script>
</body>
</html>
